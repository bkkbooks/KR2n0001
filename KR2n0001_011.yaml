body:
  text: 崇文總目卷十一宋王堯臣等撰總集類總集上共七十三部計二千六百三十九卷以下原卷五十七兩朝贊文一卷闕明良集五百卷闕楚辭十七卷文館詞林彈事四卷闕文選三十卷吕延濟注文選六十卷唐李善注謹按東觀餘論云文選李善注在五臣前崇文總目云因五臣而自為注非是東漢文類三十卷唐登科文選五十卷闕上清文苑四十卷文苑英華一千卷文粹五十卷蜀國文英集八卷闕名臣雜文二卷闕雜碑文六卷闕正元制勅書奏一卷闕元和制集十卷闕唐舊制編錄六卷闕咸通後麻制一卷闕王言㑹最五卷闕唐徳音錄三十卷擬狀注制一卷闕東壁出言三卷闕批答一卷闕雜制詔集二十一卷闕宣底八卷闕玉堂遺範三十卷闕兩制珠璣二卷闕制集三卷闕麻藁集三卷闕長興制集四卷闕顯徳制集一卷闕李慎儀集二十卷闕内制雜編十卷闕雜麻制十五卷闕雜書詔一卷闕奏議集二十卷闕唐名臣奏七卷闕諫書八十卷闕唐諫諍集十卷闕大唐直臣諫奏七卷闕奏議駁論一卷闕羽書三卷闕續羽書六卷闕總戎集十卷闕縱横集二十卷闕止戈書五十卷闕王紹顔軍書十卷闕論苑十卷闕元和制䇿三卷闕古今類聚䇿苑十四卷闕五子䇿林十卷闕禮部䇿十卷闕薛氏賦集九卷闕唐吴英雋賦集七十卷闕賦苑二百卷闕賦選五卷闕靈仙集賦二卷諸家甲賦一卷闕典麗賦集六十四卷雜賦一卷闕廣類賦二十五卷闕類史賦集一卷闕分史衡鑑十卷闕掌記畧十五卷闕新掌記畧五卷闕續掌記畧一卷闕管記苑十卷闕唐初表草一卷闕類表五十卷闕咸通初表奏集一卷闕雜表疏一卷闕分門文集十卷闕代耕心鑑甲乙判一卷闕總集下共七十四部計四百十卷以下原卷五十八續古今詩苑英華集十卷珠英學士集五卷樂府集十卷正聲集三卷續正聲集五卷闕南薫集三卷篋中集一卷起予集五卷才調集十卷麗文集五卷麗則集五卷河嶽英靈集一卷唐詩類選二十卷元白三州唱和詩一卷中興間氣集二卷丹陽集一卷極𤣥集一卷極𤣥律詩例一卷闕又𤣥集一卷江南續又𤣥集十卷擬𤣥類集十卷風集十卷闕垂風集十卷搜玉集一卷竒章集四卷連璧詩集三十二卷詩纂三卷闕資吟集五卷闕臨沂子觀光集三卷廖氏家集一卷國風總類五十卷闕雜詩一卷闕騷雅菁英三卷闕中書省試題詠詩一卷闕謹按東觀餘論云崇文總目中書省試題詠詩若集中純載詩即不可謂之詩筆按今本無筆字名賢絶句詩一卷闕名公攅錦集十二卷闕前輩咏題詩二卷闕僃遺綴英二十卷闕雜題詩一卷闕雜詩一卷闕雜編類詩二十卷闕李涉詩一卷闕五僧詩一卷闕十哲僧詩一卷闕玉臺新咏十卷玉臺後集十卷瑶池新咏二卷闕抒情集二卷本事詩一卷續本事詩二卷王右軍蘭亭詩集一卷燕歌行一卷闕道林寺詩二卷闕集賢院詩二卷虎邱寺題真娘墓詩一卷闕謝亭詩一卷諸朝彦過顧况宅賦一卷闕宜陽錄六卷闕留題恵山詩一卷九華山錄一卷道塗雜題詩一卷闕李昉唱和詩一卷闕廬山遊覽集二十卷闕新安累政詩二卷闕漢上題襟集十卷斷金集一卷元和繼和集一卷闕劉白唱和集一卷松陵集十卷闕浙東聫句集二卷西崑酬和集二卷闕翰林酬和集一卷闕應制賞花集十卷闕瑞花詩賦一卷闕别集類别集一共九十九部計一千一百三十六卷以下原卷五十九董仲舒集一卷蔡邕文集五卷陳琳文集九卷嵇康集十卷阮步兵集十卷劉琨集十卷陸雲集八卷陶潜集十卷孔稚珪集十卷王融文集七卷謝元暉文集十卷江淹集十卷沈約集九卷吴均集十卷徐陵文集二卷唐太宗集一卷武后訓記雜載十卷闕許恭宗集十卷謹按敬字改為恭宋人避翼祖諱也東臯子集二卷王勃文集三十卷王勃雕蟲集一卷闕盈川集二十卷盧照隣集十卷幽憂子三卷闕駱賓王集十卷陳拾遺集十卷任希古文集十卷崔融表集四卷闕宋之問集十卷沈佺期集十卷張九齡集二十卷吴筠集五卷闕符載文集十四卷元子文編十卷王維文集十卷蕭頴士文集十卷李華集二十卷鮑防集五卷賈至文集十卷李翰林别集十卷杜甫集二十卷岑參集十卷髙適文集十卷常相文集三十卷楊炎文集一卷梁蕭文集二十卷歐陽詹集十卷毘陵集二十卷吕温集十卷權文公集五十卷馮宿文集一卷韓愈集四十卷栁子厚集三十卷白氏文集七十卷舒元輿文一卷李觀文集三卷李翺文集十卷穆員集九卷孫逖文集二十卷皇甫湜文集一卷㑹昌一品集二十卷姑臧集五卷樊川集二十卷李甘文一卷栁冕文集一卷丹陽集一卷謹按東觀餘論云丹陽集已見總集此重出按崇文總日各門中疑於重出者尚多因無别本不敢定其為重出惟此條是黄伯思已經糾正者自此以外則未敢遽為刪併爾附識於此沈亞之集九卷南卓文集一卷闕劉三復文集一卷文泉子十卷闕孫子文纂四十卷孫郃文集四十卷孫氏小集三卷楊蘷集五卷闕楊蘷冗書十卷闕楊蘷冗餘集一卷闕程晏集七卷握蘭集三卷金荃集十卷顧况文集十九卷皮日休文集十卷胥臺集七卷闕江東後集十卷笠澤叢書三卷羅隱集二十卷闕吴越掌記集三卷闕苕川總載集十卷闕鳳䇿聫華三卷皮日休文藪十卷集遺具錄十卷闕孫樵經緯集三卷劉綺莊集十卷張元安文集三卷闕鄭凖渚宫文集一卷闕王秉集五卷闕仰説文集十卷别集二共一百一十三部計一千四百六十四卷以下原卷六十政從文集三卷闕段全緯文集五卷闕歐陽衮文集三卷毛欽一文集三卷施肩吾集十卷齊蘷集二卷闕劉軻文一卷闕鄭氏貽孫集四卷李善夷集一卷闕譚正大文集一卷張友正雜編一卷闕陳黯文集三卷鄭賓文集十卷闕陸鸞文一卷闕秣陵子文集一卷闕東平小集三卷闕景臺編十卷寧蘇集五卷闕張安石涪江集一卷沈堯文集五卷闕羅衮集三卷闕袁浩文集一卷露居子十卷投知小錄三卷鄭畋文集五卷陸扆集七卷闕樂安公徳文集五卷闕邱光庭文集三卷闕陳陶文錄十卷一鳴集三十卷鳳鳴集三卷闕賈緯文集三十卷崔拙文集二卷闕梁震文集一卷闕珠林集四卷闕一飛集一卷闕屠龍集五卷紫閣集十一卷闕金門集十卷白沙集十卷闕李氏應厯小集十卷闕李松雜文一卷闕續草堂集十卷闕演論集五十卷闕酈炎集一卷闕謹按東觀餘論云酈炎集當在前王仁裕乗軺集五卷闕鞏湖編玩三卷薛廷珪文集一卷闕遊藝集五十卷闕王溥文集二十卷闕趙上交文集二十卷闕范質文集三十卷薛居正集三十卷闕髙錫集一卷闕端揆集四十五卷闕竇儼文集五十卷闕陶榖文集十卷扈載文集二十卷鰲山集一卷闕王氏文集二十卷闕李至集四十卷小畜集三十卷東觀集十卷闕文懿集三十卷闕宋白文集一百卷盧植曲肱集六卷西垣集四十卷闕种隱君小集二卷河東先生集十五卷徐鉉文集二十卷張泊集五十卷闕李昉集五十卷闕朱昂文集三十卷闕劉夤文集一卷闕李瑩文集十卷鞠氏文集二十卷闕武夷集二十卷册府應言十卷杜光庭集三十卷浣花集二十卷闕王超洋源集二卷闕要録十卷闕簪履編十卷闕龍吟集三卷闕長樂集一卷闕游恭文集一卷闕小東里集三卷闕廣東里集四十卷闕湯文圭登龍集十卷闕周延禧百一集二十卷闕聱書十卷解聱書十五卷李煜集十卷李煜集畧十卷闕宋齊邱集四卷芸閣集十卷闕斐文集五卷闕盛文幹梅頂集五卷孟拱辰文集三卷闕孫晟文集五卷徐鍇集十卷潘舍人集三十卷闕僧彚征集七卷闕孫開物文集十六卷闕遺榮集三卷闕張琳文集十卷闕徐杲集八卷闕東堂集三卷闕張琛文集三卷闕宗巖文集一卷闕嘉善集五十卷闕崇文總目卷十一
