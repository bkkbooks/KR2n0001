body:
  text: 崇文總目卷八宋王堯臣等撰卜筮類以下原卷三十九共六十部計一百一十四卷經三卷闕史蘇撰謹按郡齋讀書志云靈龜經一卷史蘇撰崇文目三卷齊人行兵天文龜眼玉鈐論三卷闕龜經一卷闕不著名氏述龜卜之法龜經一卷闕不著名氏述龜兆占五行龜經一卷不著名氏亦龜卜之法龜經髓訣二卷闕春秋龜䇿經一卷闕龜經要略二卷闕周易林一十八卷周易律厯一卷闕文王版詞一卷闕周易經類二卷闕周易八仙經一卷周易杜陵賁卜法一卷周易竅書三卷闕郭璞洞林一卷陶隱居林一卷闕易鑑三卷闕周易卜經一卷周易子夏十八章三卷闕周易子夏林占一卷闕周易論一卷闕周易天門子卜法二卷闕周易太清易經訣一卷闕周易繚繞詞一卷闕周易河圖術一卷闕陶隱居易髓三卷闕周易通神類一卷闕周易探玄九卷闕周易三備三卷闕周易中備雜機要一卷闕管公明隔山照一卷闕君平占卦法一卷闕周易靈禎述一卷闕諸家易林一卷闕周易林一卷闕周易飛伏例二卷闕周易靈禎訣一卷闕周易飛燕穿關林竅一卷闕周易鬼靈經一卷闕周易罔象玄珠五卷闕卜筮雜占卦一卷闕周易占法易髓三卷闕周易紇骨林三卷闕易法一卷闕周易備要一卷闕周易通禎釋例三卷闕周易斷卦夢江南一卷闕周易六神頌一卷闕周易火竅一卷闕周易六十四卦歌一卷周易指迷照膽訣二卷周易軌限算一卷歷數緯文軌䇽一作䓆三卷謹按朱彞尊抄夲作䇽永樂大典作䓆宋藝文志有晷䇽算經法三卷又有周易䓆蓂璇璣軌革口訣三卷軌限立成歷一卷闕靈棋經一卷士術一卷闕人倫寶鑑卜法一卷闕天文占書類以下原卷四十共五十一部計一百九十七卷荆州劉石甘巫占一卷闕天文録三十卷闕天文星經五卷闕乙巳占十卷古今通占鑑三十卷天文占一卷闕大象元文一卷闕乾坤祕奧七卷太白會運逆兆通代記圖一卷闕大唐開元占經三卷闕長厯算五星所在宿度圖二卷闕天文大象賦一卷丹元子步天歌一卷謹按東觀餘書云崇文總目占書類丹元子步天歌此但記列星所在并其家數使人易識耳非占説也長短經天文篇一卷闕天文總論十二卷闕通元玉鑑頌一卷靈憲圖三卷闕徴應集三卷闕星書要略六卷闕大象元機歌三卷闕妖瑞星圖一卷闕天機立馬占一卷闕天文鑑經要訣一卷闕元象應驗録二十卷天象圖一卷闕格子圖一卷大象厯一卷闕星經手集二卷二十八宿分野五星巡應占一卷括星詩一卷入象圖一卷闕推占龍母探珠詩一卷闕推占青霄玉鑑經一卷宿曜度分域名録一卷闕乾象祕訣一卷闕妖瑞星雜氣一卷闕大象垂萬列星圖三卷闕祥瑞圖一卷闕大霄論璧一卷闕占風九天元女經一卷闕定風占詩一卷氣象圖一卷闕天涯地角經一卷占風雲氣候日月星辰上下圖一卷闕乾象占一卷闕雲氣測候賦一卷闕占候雲雨賦一卷謹按宋史藝文志五行類雲雨賦一卷注云崇文總目有劉氏啓明占候雲雨書即此也景祐乾象新書三十卷謹按郡齋讀書後志云景祐乾象新書三卷崇文總目三十卷置之天文類厯數類以下原卷四十一共四十七部計二百二十九卷建隆應天厯六卷闕太平乾元厯九卷闕咸平儀天厯十六卷闕渾儀法要十卷略例一卷開元大衍厯三十卷闕寶應五紀厯經二卷闕建中正元厯一卷闕長慶宣明厯三十四卷闕長慶宣明厯要略一卷闕宣明厯捷超例要略一卷闕景福崇元厯四十一卷闕天福調元厯二十卷闕廣順明元厯一卷闕顯德欽天厯十五卷闕武成永昌厯三卷闕正象厯經一卷闕保大齊政厯十九卷大衍通元鑑新厯三卷闕萬分厯一卷闕新修厯經三卷闕大唐長厯一卷闕應寶厯經三卷闕枝元長厯一卷闕都利聿斯經二卷闕新修聿斯四門經一卷闕文殊菩薩所記宿曜經一卷闕七曜符天人元厯三卷闕曺公小厯一卷闕都利聿斯訣一卷闕聿斯鈔略旨一卷闕七曜伏天厯一卷闕符天九曜通元立成法二卷闕青蘿厯一卷青霄玉鑑三卷闕稱星經一卷符天行宫一卷闕難逃論一卷氣神經三卷闕七曜氣神厯代帝紀五卷闕氣神鈐厯一卷闕氣神隨日用局圖一卷闕七神七曜一卷占課禽宿情性訣一卷闕七曜氣神歌訣一卷闕五行類五行上共四十二部計五百四卷以下原卷四十二乾坤寶典四百十七卷闕廣古今五行記三十卷闕樵子五行志五卷蓬瀛書三卷闕含文嘉三卷闕三鑑三卷闕黃帝朔書一卷闕月令圖一卷四民福祿論三卷年鑑一卷黃帝四序堪輿經一卷闕太史堪輿一卷闕太史堪輿厯一卷闕黃石公備氣三元神龜經一卷闕淮南王見機入宅經一卷隂陽二宅圖經一卷上象隂陽星圖一卷闕五符圖一卷闕天上九星修造吉凶歌一卷闕隂陽二宅心鑑一卷闕隂陽實録一卷闕勝金厯要訣一卷闕隂陽二宅相占一卷闕隂陽二宅歌一卷濟家備急廣要録一卷闕龍紀聖異厯一卷闕廣濟隂陽百忌厯一卷天寶厯一卷闕唐七聖厯一卷闕五行家通國用圖録一卷闕明時要覽録一卷師曠擇日法一卷闕橫推厯一卷闕選日擇要厯四卷闕選日隂陽月鑑一卷闕廣聖厯一卷白虎通五經訣一卷闕西天隂符紫微七政論一卷闕婚書一卷闕謹按鄭樵通志云婚書極多崇文只有一卷而已壇經一卷怪書一卷闕郯子占烏經二卷闕五行中共七十三部計一百八十五卷以下原卷四十三太一王佐祕珠一卷闕太一元鑑五卷闕太一金鑑式十卷天寶太一靈應式記五卷闕太一時紀隂陽二遞立成厯二卷闕日逰太一五子先出軍勝負七十二局一卷闕太一樞會賦一卷闕新修中樞祕頌太一明鑑五卷闕謹按永樂大典明鑑下有法字太一細行草二卷闕太一雜集算草一卷闕太一集十卷闕太一新鑑一卷闕隂陽二遁太一一卷闕太一遁甲萬勝恃定主客立成訣一卷闕太一時記鈐一卷闕十神太一巡逰分野立成圖一卷闕太一隂陽二遁立成一卷闕新修時逰太一立成一卷闕太一陽九百六經一卷闕新修太一青虎甲寅經一卷闕太一飛烏十精厯一卷太一神樞長厯一卷闕太一歌五卷闕不著姓氏以太一為雜術太一歌一卷不著名氏以太一為歌詩太歌祕歌一卷闕不著名氏以太一事目為歌詩新修九宫一卷闕三元飛化九宫法一卷闕三元經一卷甲子太極導經一卷闕中祛惑遁甲經三卷遁甲十八局一卷隂陽二遁萬一訣四卷遁甲搜元經一卷闕遁甲符寶萬嵗經國厯一卷三元遁甲一卷遁甲元樞三卷闕天一遁甲隂局鈐圖一卷闕遁甲専征賦一卷天一遁甲兵機舉要歌一卷闕遁甲玉女返閉局法一卷元女遁甲祕訣一卷闕金匱經三卷神樞靈轄十卷連珠明鑒式經十卷闕綘囊經一卷闕六壬軍鑒式三卷闕元女青華經三卷闕六壬瓶記一卷玉帳經一卷推人鈞元法一卷闕三式參合立就厯三卷闕六壬括明林經一卷闕三傳四課鈐一卷闕六壬録六卷闕六壬鈐一卷五真降符六壬神武經一卷闕六壬元鑑一卷闕明鑒連珠起釋卦門課例法一卷闕六壬明鑒連珠歌一卷闕祕寶翠羽歌三卷六壬大玉帳歌十卷闕六壬心鑒歌三卷六壬六十四卦名一卷闕六壬軍帳賦一卷闕六壬戰勝歌一卷闕六壬啓蒙慕要一卷闕玉關歌一歌六壬詩一卷闕景祐太一福應集要十卷景祐遁甲符應經三卷景祐六壬神定經十卷景祐三式目録一卷闕謹按郡齋讀書志曰常陽經一卷崇文目題曰黃帝式用蓋六壬占卜術也五行下共五十部計一百四十五卷以下原卷四十四乾坤寶典葬書三十卷闕大唐地理政經十卷闕五音地理經十五卷闕葬範三卷地理三寶經九卷闕地理六壬六甲八仙經八卷闕五婚合諸家風水地理一卷闕推葬呼厯一卷闕五音山前訣一卷闕照幽記一卷闕周易枯骨經一卷闕周易括地林一卷闕金婁地鑑一卷闕地鑑三卷闕老子地鑑訣祕術三卷闕三命訣三卷闕考平三命訣一卷闕六壬鑑經三卷人元祕術三卷闕推計命祿厄運詩一百首一卷闕三命通元論三卷闕推太嵗行年吉凶厄一卷闕竹論經三卷五行九中歌一卷闕穆護詞一卷三命大行年入局韜鈐三卷闕司馬先生三十六禽歌一卷闕五命珞琭賦一卷風石三命一卷闕洪範碎金訓字一卷闕行年五鬼轉運九宫法一卷闕新集祿命書一卷闕祿命人元經二卷闕相書七卷闕人論龜鑑三卷孤市子卿相法三卷闕麻子經一卷肉眼通神論三卷月波洞中記一卷元靈子相法一卷顯光師相法一卷闕相祿歌一卷闕元靈子相法一卷桞隨風占氣色歌一卷一十七家集衆相書一卷占氣色要訣圖一卷闕袁天綱要訣三卷闕六神相押字法一卷相笏經一卷陳混掌撰黃帝神光經一卷闕相笏經三卷闕不著撰人名氏占燈經一卷謹按郡齋讀書後志占燈法一卷李淳風撰崇文總目有之夢書四卷闕夢雋一卷闕淮南子術一卷崇文總目卷八
