body:
  text: 崇文總目卷七宋王尭臣等撰醫書類醫書一共五十九部計一千二百七十二卷以下原卷三十四太平聖惠方一百卷神醫普救方一千卷闕黄帝八十一難經二卷難經䟽十三卷黄帝素問八卷闕全元起撰黄帝素問二十四卷開寳重定神農夲草二十一卷夲草二十卷新詳定夲草二十卷夲草二十卷夲草韻畧五卷闕夲草音義五卷闕夲草拾遺十卷四聲夲草四卷闕刪繁夲草五卷闕夲草性類一卷脉經十卷王叔和撰脉經十卷闕不著姓氏脉經一卷不著姓氏雜論脉症李勣脉經一卷闕黄帝脉訣一卷脉經訣録一卷黄氏脉訣一卷闕金鑑集歌一卷闕金寳鑑一卷闕脉經手訣一卷闕百㑹要訣脉經一卷闕鳯髓脉經機要一卷闕醫鑑一卷碎金脉訣一卷闕延齡至寳診脉定生死三部要訣一卷闕延靈寳抄一卷元門脉訣一卷闕太醫秘訣診脉候生死部一卷闕徐氏指下訣一卷闕脉訣二卷闕徐裔撰倉公訣死生秘要一卷闕新集脉色要訣一卷經要集一卷金匱指㣲訣一卷巢氏諸病源候論五十卷闕論證病源五卷闕法家論語一卷闕問醫療訣一卷闕病源手鑑一卷内䑓要術五卷闕五鑑論一卷醫顯微論一卷闕太元新論一卷集諸要方一卷闕金匱玉函要畧三卷藥性要録一卷闕金匱録五卷闕醫門秘録五卷闕今體治世集三卷闕萬病拾遺三卷闕伏氏醫苑一卷醫門簡要十卷闕新集病總要畧一卷闕闕醫書二共六十部計三百八十八卷以下原卷三十五太帝分藥格一卷闕藥性論四卷闕採藥論一卷闕制藥法論一卷闕金鑑方三卷闕乾寧晏先生制伏草石論六卷闕藥對二卷闕方書藥類三卷闕刪繁藥脉三脉闕新廣藥對三卷闕石藥異名要訣一卷闕藥總訣一卷闕醫門指要用藥立成訣一卷闕丹房鍳源三卷南源藥譜一卷闕神農食忌一卷闕藥林一卷闕新修榮衛養生用藥補瀉論十卷闕炮炙論三卷陳雷炮炙論三卷胡道洽方三卷闕正元集要廣利方五卷闕廣正集靈寳方一百卷闕太和濟要方五卷闕千金方三十卷千金髓方二十卷闕千金翼方三十卷𫝊信方二卷闕續𫝊信方十卷闕昇元廣濟方二卷闕韋氏集騐獨行方三卷闕崔行功纂要方十卷闕羣方秘要方三圖博濟安衆方二卷闕集諸要妙方一卷闕纂集韓待詔肘後方一卷闕兵部手集三卷嵩䑓集三卷闕鄭氏恵心方三卷闕劉涓子鬼遺方十卷謹按直齋書録解題云劉涓子神仙遺論十卷東蜀刺史李頔録按中興書目引崇文總目云宋龔慶宣撰劉涓子者晉末人於丹陽縣得鬼遺方一卷皆治癰疽之法慶宣得而次第之南行方十卷闕秘要藥方一卷闕王氏醫門集二十卷闕集騐方一卷闕千金秘要備急方一卷闕唐興集騐方五卷闕應騐方一卷闕新集應病通神方三卷闕普濟方五卷闕崔氏應騐方三卷闕鄭氏惠民方一卷闕箧中方三卷闕塞上方三卷闕梅崇獻方五卷闕延年秘録十卷闕延齡至寳方十卷備急方一卷刪繁要略方一卷闕備要簡急方一卷鄭氏纂秘要藥方二卷闕醫書三共五十二部計一百五十三卷以下原卷三十六外䑓備要四十卷外䑓要略十卷闕病源丸經一卷闕醫明要略一卷闕醫家要抄五卷闕通元經十卷闕醫門金寳鑑三卷闕耆婆八十四問一卷闕六十四問一卷闕問答病狀一卷闕問病録一卷闕百一問答方三卷闕黄帝五臟論一卷闕神農五臟論一卷闕五臟傍通明鑑圖一卷闕五臟榮衛論一卷闕五臟論一卷張仲景撰論黄庭五臟論七卷闕五臟論一卷闕裴進撰五臟金鑑論一卷闕大五臟論一卷闕小五臟論一卷闕五臟論應象一卷黄庭内景五臟六府圖一卷闕五臟類合賦一卷闕連方五臟論一卷闕五色傍通五臟圖一卷闕臟府通元賦一卷闕耆婆五臟論一卷五臟鑑元四卷闕五臟要訣一巻闕萬全方三卷别集玉壺備急大方一卷闕集諸纂騐方一卷闕雜藥方一卷闕楊太僕醫方一卷闕行要備急方一卷闕録騐備急諸方一卷闕諸家名方一卷闕走馬備要方一卷闕北京要術二卷闕巾箱集一卷闕川玉集一卷闕崔氏方三卷闕海山集騐方十卷闕秘要方一卷闕千金纂録二卷闕還元丹方一卷闕養性益夀備急方一卷闕仙人養性治身經三卷闕王氏秘方五卷闕集妙方三卷闕醫書四共六十五部計一百三十九卷以下原卷三十七劉涓子鬼論一卷闕元感𫝊屍論一卷闕骨蒸論一卷闕癰疽論一卷闕水氣論一卷闕風疾論一卷闕五勞論一卷闕夭夀性術論一卷新修鐘乳論一卷闕鐘乳論一卷闕脚氣論一卷闕三家脚氣論一卷闕清溪子消渴論闕鐡粉論一卷癰疽論三卷闕風論山眺經二卷闕張果先生傷寒論一卷闕發背論一卷闕僧知宣撰發背論十卷闕白岑撰龍樹眼論一卷闕新撰脚氣論三卷闕論三十六種風一卷闕青鳥子風論一卷闕傷寒論十巻闕楚人劉豹子眼一卷闕傷寒手鑑二卷闕嶺南脚氣論一卷闕傷寒正辨集一卷闕廣陵正師口齒論一卷闕口齒玉池論一卷闕咽㗋口齒方論一卷闕口齒論三卷中和先生撰張仲景口齒論一卷西京巢家水氣論一卷闕醫眼鍼方論一卷闕南仲四時攝養論一卷闕口齒論一卷闕邵英俊撰療口齒雜方一卷闕百中傷寒論三卷闕謹按鄭樵通志校讐略書有不應釋論云崇文總目問有見名知義者亦強為之釋如鄭景岫作南中四時攝生論其名自可見何用釋哉如陳昌允作百中傷寒論其名亦可見何必曰百中者取其必愈乎療腫論一卷闕養身食法三卷闕食性夲草十卷闕食療夲草三卷闕食醫心鑑三卷蕭家法饌三卷闕侍膳圖三卷闕江飱饌要一卷闕饌林五卷闕膳夫經手錄四卷闕嚴龜食法十卷産前後論一卷闕産後論一卷集産後十九論一卷闕家寳義囊一卷闕崔氏産鑑圖一卷闕産寳三卷子母秘録十卷楊氏産後乳集三卷闕何首烏傳一卷草木諸藥单方一卷闕脚氣方一卷闕賈相公備急单方一卷闕秦聞单方一卷闕单方一卷闕穆昌叙眼方一卷闕醫書五共六十五部計一百三十卷以下原卷三十八銅人俞穴鍼灸圖經三卷闕黄帝鍼經一卷闕黄帝岐伯論鍼灸要訣一卷闕新集明堂灸法三卷闕山眺鍼灸經一卷闕鍼經抄三卷闕公孫克鍼灸經一卷灸經十卷闕明堂論一卷闕謹按鄭樵通志云唐志别出明堂經脉一條而崇文總目合為醫書據明堂一類亦有数家以為一條已自踈矣况合於醫書而其類又不相附可乎金縢玉匱鍼經三卷闕元悟四神鍼法一卷闕扁鵲鍼傳一卷闕經食草木法一卷闕服食神秘方一卷闕神仙金匱服食方二卷闕新集方一卷闕李八百方一卷闕孟氏補養方三卷闕老子服食方一卷闕集錄古今服食導養方三卷闕通元秘要術三卷闕圃田通元秘術方三卷闕纂集秘要合煉神妙方五卷闕返魂丹方一卷闕通元秘録三卷闕嬰孩病源論一卷闕崔氏小兒論一卷闕嬰孺方十卷闕療小兒論一卷小兒方疳二十四候論一卷闕小兒管氣集三卷闕小兒方術論一卷闕孩孺明珠變蒸七方論一卷闕孩子脉訣論一卷闕小兒藥證一卷闕小兒秘録一卷闕仙人氷鑑圖訣一卷闕保童方一卷闕嬰孩論二卷童子秘訣三卷嬰兒雜方五卷闕粧䑓寳鑑集三卷闕粧䑓方一卷發焰録一卷闕修玉粉丹口訣一卷闕服雲母談一卷闕㐲火丹砂訣一卷闕謹按鄭樵通志云崇文總目既以外丹煅法為道家書矣又於醫書中見㐲火丹砂通元秘訣数條大抵爐火與服餌兩種向來道家醫家雜出葛仙公杏仁煎方一卷闕元明粉方一卷闕神枕方一卷神仙雲母粉方一卷闕吞字貼腫方一卷闕備纂療癰疽要訣一卷闕瘰癧方一卷闕徒都子膜子外氣方一卷闕名醫傳十卷闕靈方志一卷闕意醫紀歴一卷闕療黄經三卷闕療黄歌一卷闕相色經妙訣一卷闕靈竒壁奥三卷闕審的選要歌一卷闕審的眼藥歌三卷排玉集三卷闕崇文總目卷七
