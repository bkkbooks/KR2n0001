body:
  text: 崇文總目卷三宋王堯臣等撰正史類以下原卷九昔孔子删書上斷堯典下訖秦誓著為百篇觀其堯舜之際君臣相與吁俞和諧於朝而天下治三代以下約束賞罰而民莫敢違考其典誥誓命之文純深簡質丁寧委曲為體不同周衰史廢春秋所書尤謹密矣非惟史有詳略抑由時君功德薄厚異世而殊文哉自司馬氏上採黃帝迄於漢武始成史記之一家由漢以來千有餘歲其君臣善惡之跡史氏詳焉雖其文質不同要其治亂興廢之本可以考焉共三十部計二千一百六十二卷史記一百三十卷史記八十七卷唐陳伯宣注因裴駰說有所未悉頗增損焉然多取司馬氏索隱以為已說今篇殘缺史記音義十九卷史記索隱三十卷史記正義三十卷為漢書學者此最精博謹按此注似不應在史記正義下今姑仍原本録之附識于此漢書一百卷漢書問答五卷闕唐沈遵行撰采諸儒為漢書說者申釋其義有博聞之益然篇第頗差討求未獲闕劉傳以下諸篇後漢書九十卷志三十卷新校史記一百三十卷余靖等校正新校前漢書一百卷余靖等校正新校後漢書九十卷余靖等校正三史刋誤四十五卷闕皇朝張觀等校定初袐書丞余靖上言國子監所收史記漢書誤請行校正詔翰林學士張觀知制誥李淑宋祈與靖洎直講王洙于崇文院讎對靖等悉取三館諸本及先儒注解訓傳六經小說字林說文之類數百家之書以相參校凡所是正增損數千言尤為精備逾年而上之靖等又自録其讎校之說别為刋誤四十五卷三國志六十五卷晉書一百三十卷晉書音義三卷宋書一百卷其書雖諸志失于限斷然有博洽多聞之益今世雖所傳文多舛失參補未獲趙倫之傳一卷今闕謝靈運傳文注訛駮齊書五十九卷梁書五十六卷陳書三十六卷後魏書一百三十卷齊天保中始詔收撰魏史收博采諸家舊文隨條甄舉綴屬後事成一代大典追叙魏先祖二十八帝下終孝靜作十二紀九十二列傳十志析之凡一百三十篇而史有三十五例二十五序九十四論前後二表一啓然收諂于齊氏言魏室多所不平至隋開皇中勑魏淡更作魏史唐李延壽作北史並行于世與收史相亂因而卷第殊舛今所存僅九十餘篇後魏紀一卷闕魏淡撰初髙祖以魏收書褒貶失實平繪中興事叙事不倫詔淡别成魏史淡斷自道武下迄恭帝為十二帝紀七十八列傳史論及例目録一篇合九十二篇退東魏孝靜帝稱傳矯正收繪之失收天子名則書太子名則諱淡諱皇帝名書太子自收諱太武獻文之弒使同善終天年淡顯書之以懲逆收書敵國皆曰死淡曰卒體裁簡正帝甚善之然世以收史為主故淡書亡闕今才紀一卷存後魏書天文志二卷闕唐張太素撰魏書凡百篇今悉散亡唯此二篇存焉北齊書四十九卷後周書五十卷隋書八十五卷志三十卷唐書一百三十卷唐韋述撰初吳兢撰唐史自創業訖于開元凡一百一十卷述因兢舊本更加筆削刋去酷吏傳為紀志列傳一百一十二卷至德乾元以後史官于休烈又增肅宗紀二卷而史官令狐峘等復于紀志傳後隨篇增緝而不加卷帙今書一百三十卷其十六卷未詳撰人名氏唐書二百卷五代史一百五十卷編年類以下原卷十昔孔子之後繼以戰國諸侯交亂而史氏廢失䇿書所載紀次不完司馬遷始為紀傳表志之體網羅千載馳騁其文其後史官悉用其法春秋之義書元最謹一時無事猶空書其首月以謂四時不具則不足成年所以上尊天紀下正人事自晉荀悅為漢紀始復編年之體學徒稱之後世作者皆與正史並行云共三十八部計五百七十九卷前漢紀三十卷後漢紀三十卷漢春秋一百卷闕漢春秋問答一卷闕三十國春秋三十卷晉春秋略三十卷太清紀十卷梁王韶撰起太清元年盡六年初侯景破建鄴韶西奔江陵士人多問城內事韶不能人人為說乃疏為一篇問者即示之元帝聞而取讀曰昔王韶之為隆安記言晉末之亂離今亦可以為太清記矣韶因為之然其議論皆謝之矣又韶希帝旨撰述多非實録魏典三十卷唐太常少卿元行冲撰起道武帝終宇文革命凡三十篇孝武入關則書東魏為東帝並載兩國事為凡例微用編年之法文約事詳學者宗之行冲以族出于魏尅意論著引魏明帝時西栁谷瑞石有牛繼馬後之象舊史謂元帝本出牛氏行冲以為非因言道武名犍繼晉受命此其應也特為論載于篇三國典略三十卷唐汾州司户參軍丘悅撰以關中鄴都江南為三國起西魏終後周而東包魏北齊南總梁陳凡三十篇今卷第多遺自二十一以下卷闕五運録二十卷闕唐曹圭撰起三皇訖隋年世之略唐歷四十卷唐統紀一百卷古今通要四卷唐歷目録一卷闕通歷十卷通録六十五卷開皇紀三十卷鄭向撰唐朝年代記十卷闕正閏位歷三卷闕建元歷二卷闕古今年號録七卷嘉號録一卷闕元類一卷闕王氏五位圗三卷帝王歷數歌一卷闕歷代年號一卷兩漢至唐年紀一卷古今年代歷一卷闕年歷圖八卷闕帝王興廢年代録二卷闕帝王年代圖一卷闕古今類聚年號圖一卷年號歷一卷闕歷代王正運五運圖一卷闕年紀録一卷闕年號歷一卷闕歷代君臣圖三卷闕唐至五代紀年記二卷闕實録類以下原卷十一實録起于唐世自髙祖至于武宗其後兵盜相交史不暇録而賈緯始作補録十或得其二三五代之際尤多故矣天下乖隔號令並出傳記之事訛謬尤多幸而中國之君實録粗偹其盛衰善惡之跡較然而著者不可泯矣共三十三部計八百四十一卷唐髙祖實録二十卷正觀實録四十卷闕唐髙宗復修實録三十卷唐則天實録二十卷唐中宗實録二十卷太上皇實録十卷睿宗實録五卷明皇實録一百卷肅宗實録三十卷代宗實録四十卷建中實録十卷唐史館修撰沈既濟撰起大歷十四年德宗即位盡建中二年十月既濟罷史官之日自作五例所以異于常者舉終必見始善惡必評月必舉朔史官雖卑出入必書太子曰薨自謂辭雖不足而書法無隱云德宗實録五十卷順宗實録五卷憲宗實録四十卷敬宗實録十卷穆宗實録二十卷文宗實録四十卷武宗實録一卷謹按鄭樵通志云實録自出于當代崇文總目有唐實録十八部既謂唐實録得非出于唐人之手何須一一釋云唐人撰唐年補録六十五卷闕梁太宗實録三十卷後唐懿祖紀年録一卷後唐獻祖紀年録二卷後唐太祖紀年録十七卷闕後唐莊宗實録二十卷後唐明宗實録三十卷後唐廢帝實録十七卷後唐愍帝實録三卷闕晉髙祖實録三十卷晉少帝實録三十卷漢髙祖實録二十卷漢隱帝實録十五卷周太祖實録三十卷周世宗實録四十卷雜史類以下原卷十二周禮天子諸侯皆有史官晉之乘楚之檮杌考其紀事為法不同至於衰周七國交侵各尊其主是非多異尋亦磨一作靡滅其存無幾若乃史官失職畏怯回隱則遊談處士亦必各記其說以伸所懷然自司馬遷之多聞當其作史記必上採帝繫世本旁及戰國荀卿所録以成其書則諸家之說可不偹存乎謹按鄭樵通志云崇文總目衆手為之其間有兩類極有條理古人不及後人無以復加也道書一類有九節九節相屬而無雜揉又雜史一類隋唐二志皆不成條理今觀崇文之作賢于二志逺矣此二類往往是一手所編惜乎當時不盡以其書屬之也雜史上共六十八部計六百七十一卷周書十卷越絶書十五卷子貢撰或曰子胥舊有內紀八外傳十七今文題闕舛載二十篇又載春申君疑後人竄定世或傳二十篇者非是謹按趙希辨郡齊讀書附志云越絶書隋經籍志十六卷崇文總目十五卷希辨考其所以第一卷荆平王內傳至第十五卷篇叙外傳此十五卷也然第一卷有所謂越絶外傳本事一篇此其為十六卷歟戰國䇿二十二卷戰國䇿八卷漢護左都水使者光祿大夫劉向録舊號或曰國䇿或曰國事或曰短長或曰事語或曰長書或曰修書向以戰國時遊士輔所用之國為之䇿謀宜為戰國䇿凡十二國三十三篇繼春秋以後記楚漢之興總二百五十年事今篇卷亡闕第二至十三十一至三闕又有後漢髙誘注本二十卷今缺第一第五第十十一至二十止存八卷按朝公武郡齊讀書志曰戰國䇿崇文總目多闕至皇朝曽鞏校書訪之士大夫家其書始復完吳越春秋十卷吳越春秋傳十卷唐皇甫遵注初趙曄為吳越春秋十卷其後有楊方者以曄所撰為煩又刋削之為五卷遵乃合二家之書考定而注之漢武故事五卷九州春秋九卷春秋後語十卷髙氏小史一百一十卷謹按黃伯思東觀餘論云崇文總目髙氏小史名峻一作崚南史八十卷北史一百卷謹按鄭樵通志云李延壽南北史崇文類于雜史非五代新說二卷建康實録二十卷金陵樞要一卷吳書實録三卷闕六朝採要十卷史雋十卷十三代史選五十卷隋平陳記一卷大業拾遺十卷大業略記三卷大業拾遺録一卷隋季革命記五卷劉氏行年記十卷大唐創業起居注三卷唐太宗勳史一卷闕貞觀政要十卷唐書偹闕記十卷明皇政録十卷明皇雜録二卷趙元撰天寶亂離西幸記一卷幸蜀記一卷開天傳信記一卷河洛春秋一卷安祿山事跡三卷邠志一卷大唐新語十三卷奉天記一卷闕徐岱撰德宗幸奉天録一卷崔光廷撰奉天録四卷興元聖功録三卷闕燕南記三卷闕唐故事稽疑十卷闕平蔡録一卷平淮西記一卷河南記一卷元和辨謗録三卷太和摧凶記一卷闕乙卯記一卷甘露記二卷開成紀事三卷闕開成承詔録二卷文武兩朝獻替記三卷唐録備闕十五卷會昌伐叛記一卷貞陵遺事二卷續陵遺事一卷平剡録一卷闕東觀奏記三卷彭門紀亂三卷咸通解圍録一卷唐録政要十二卷廣陵妖亂志三卷中朝故事三卷雲南事狀一卷闕金鑾密記一卷會稽録一卷雜史下共三十四部計三百三十五卷以下原卷十三汴水滔天録一卷汴州記一卷梁太祖編遺録三十卷闕梁列傳十五卷闕後唐列傳三十卷闕莊宗召禍記一卷晉朝陷蕃記四卷陷蕃記四卷陷虜記三卷周世宗征淮録一卷闕三朝革命録三卷闕入洛私記十卷闕補國史六卷闕唐補記三卷史系二十卷唐朝綱領圖一卷闕唐聖運圖二卷國史補三卷逸史三卷闕史三卷功臣録三十卷闕後史補三卷賈緯備史六卷闕文行録五十卷闕續皇王寶運録十卷史略五卷闕十六國春秋略二卷闕十二國史四卷三史菁英三十卷闕晉史金穴抄十卷闕史通二十卷史例三十卷史通析微十卷正史雜論十卷闕僞史類以下原卷十四周室之季吳楚可謂强矣而仲尼修春秋書荆以狄之雖其屢進不過子爵所以抑黜僣亂而使後世知懼三代之弊也亂極于七雄並主漢之弊也亂極于三國魏晉之弊也亂極于永嘉以來隋唐之弊也亂極于五代一又有五代字之際天下分為十三四而私竊名號者七國及大宋受命王師四征其係纍負質請死不暇九服遂歸于有德歷考前世僣竊之邦雖一有甚字因時苟偷自强一方然卒歸于禍敗故録于篇以為賊亂之戒云共二十七部計三百二十六卷華陽國志十五卷家王故事一卷闕吳越偹史十五卷前蜀王氏紀事二卷前蜀書四十卷闕僞蜀孟氏先主實録三十卷僞蜀孟氏後主實録八十卷闕淝上英雄小録二卷䢴溝要略九卷闕吳録二十卷吳將佐略一卷闕江南録十卷髙皇帝過江事實一卷湖湘髙氏故事二十卷閩中實録十卷閩王審知傳一卷闕後蜀孟氏紀事三卷南紀國圖一卷闕文場內舉人儀則一卷僞吳楊氏本紀六卷闕劉氏興亡論一卷坤儀令一卷廣政雜録三卷闕蜀桂堂編事二十卷闕戊申英政録一卷闕廣政雜記十五卷闕烈祖開基録十卷職官類以下原卷十五堯舜三代建官名數不同而周之六官偹矣然漢唐之興皆因秦隋官號而損益之足以致治興化由此而言在乎舉職勤事代公治物一而已至于車服印綬爵秩俸廪因時為制著于有司一有焉字書曰無曠庶官又曰允釐百工夫百官象物奉職恭位此虞舜所以端拱無為而化成天下可不重哉共三十四部計二百二卷漢官儀一卷蘇綽六條一卷闕官職訓一卷闕唐六典三十卷具官事跡七卷謹按直齊録書解題云具員故事十卷崇文總目作具員事跡中興書目惟有七卷三卷闕集賢注記三卷御史臺記十二卷御史臺故事三卷唐年小録八卷元和百司舉要一卷官品纂要十卷鳯池録五卷相國事狀七卷翰林志五卷翰林舊規一卷文昌損益二卷職官該二卷唐循資格一卷闕唐天寶中修唐循資格一卷闕唐王涯撰梁循資格一卷闕職官要録三十卷史館故事録三十卷職官品服三十一卷闕續翰林志二卷次續翰林志二卷史館𢡟官志五卷職官要録抄三卷闕歷代官號十卷循資歷一卷闕叙官朝儀五卷闕翰林內志一卷唐宰輔圖二卷闕唐中書則例一卷闕百官考選敕格五卷闕儀注類以下原卷十六昔漢諸儒得古禮十七篇以為儀禮而大射之篇獨曰儀蓋射主于容升降揖讓不可以失記曰禮之末節有司掌之凡為天下國家者莫不講乎三代之制其采章文物邦國之典存乎禮官秦漢以來世有損益至于車服禮器有司所記遺文故事凡可録者皆附于史官云共一十八部計一百十一卷正辭録三卷闕崇祀録二十卷闕諸州縣祭社稷儀一卷闕漢舊儀三卷漢官典職儀式選用一卷闕獨斷二卷大唐郊祀録十卷禮閣新儀三十卷唐葬王播儀一卷闕唐禮纂要六卷闕二儀實録一卷內外親族五服儀二卷闕書儀三卷闕裴茞撰謹按永樂大典注云茞元和太常少卿書儀二卷闕鄭餘慶撰家祭儀一卷徐閏撰家祭禮一卷孟詵撰寢堂時享儀一卷闕祠饗儀一卷祭録一卷闕家薦一卷闕孫氏仲享儀一卷書儀二卷闕杜有晉撰使範一卷掌禮儀注八卷闕梁南郊儀注一卷闕新定書儀二卷闕劉嶽撰四季祭祀文一卷闕汾隂后土故事三卷闕鹵簿圖記二卷崇文總目卷三
