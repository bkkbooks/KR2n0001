body:
  text: 崇文總目卷九宋王堯臣等撰道書類道書一共五十五部計一百四卷以下原卷四十五天黄内文一卷闕太上黄庭内景玉經一卷黄庭外景經一卷記天皇氏至帝嚳受道得仙事黄庭外景玉注訣一卷謹按東觀餘論云崇文總目黄庭經此特梁丘子注耳東觀餘論又一條云張萬福唐人有傳總目云不詳何代人按束觀餘論此條所稱張萬福者其次第在黄庭經一條之下今遍檢此本無之姑附於此天語隱洞章玉訣一卷闕天真皇人經一卷闕天尊禁戒妙經一卷闕太上回元九道飛行羽經一卷闕太元真一本除經一卷太上老君枕中保生秘宻經一卷闕天真皇人九仙經一卷謹按郡齋讀書志天真皇人九仙經一卷天皇人為黄帝説一行羅公逺葉法静注論水火龍虎造金丹之術崇文書也太上洞元靈寳部經一卷闕新歌註道徳經一卷闕上清青要紫書金根衆經一卷闕九域經六卷闕太上黄素經一卷闕元都律編八卷老君家令一卷赤松子誡一卷太上洞元靈寳謁真序一卷闕大道感應論三卷幽傳福夀論一卷一切道書音義序一卷闕無上秘要一卷闕真壇刋誤論一卷闕二十八宿下降真形圖一卷闕太上金闕三洞八景隂陽仙班朝㑹圗五卷三真㫖要玉訣一卷闕三洞奉道科誡三卷元都九章明科一卷醮人神法一卷太上洞靈寳長府之府九幽玉匱明貞科一卷闕上清太上元録一卷闕元始靈寳五帝醮祭召真玉訣一卷闕告元圖一卷五等朝儀一卷三洞修道儀一卷闕修黄籙齋儀一卷闕安鎮城邑宫闕醮儀一卷醮靈官位儀一卷太上黄籙齋壇真文玉訣儀一卷天經醮儀一卷醮南辰北斗儀一卷醮文一卷許真君修九幽立成儀一卷醮章奏儀十八卷道門常朝禮懴文一卷洞元靈官五嶽名山朝儀經一卷闕太上靈寳度人消災禮懴文一卷入静儀一卷歩虚洞章一卷謹按東觀餘論云步虚洞章總目云不詳何代人修静東晉道士隱廬山昇元洞虚章一卷闕靈寶步虚詞一卷新修㫖要三卷評刋誤論三卷闕道書二共五十部計二百八十六卷以下原卷四十六真誥十卷登真隱訣六十卷上清中訣三卷靈臺秘寳符書一卷闕玉清虚無經一卷闕五公子問無虚道經一卷闕十三虚無經一卷闕仙傳拾遺四十卷演正一炁化圖二卷闕長生正義元門大論二十八卷闕三教解紛論十五卷闕三洞瓊綱三卷闕總仙記一百三十卷闕長生坐隅障五卷老子指歸十三卷襲古書三卷闕靈信經㫖一卷闕神仙可學論一卷坐忘論二卷葛仙翁序一卷闕謹按東觀餘論云崇文總目葛仙翁序葛洪此恐是葛𤣥龍虎篇一卷闕大道清曠論一卷闕真綱論一卷明真辨偽論一卷凈土論一卷重真記一卷闕元貞子三卷闕學道登真論二卷道生旨一卷闕元珠龜鑑三卷心目論一卷左慈真人助相規戒一卷闕神異書三卷闕大道形神論一卷闕正一論一卷闕道體論一卷莊子通真論三卷闕保真養生論一卷闕修行㫖要三卷元綱論三卷謹按東觀餘論云崇文總目元綱論此前已有所謂真綱論即此盖避諱改之復郭化論一卷神仙可學論一卷輔正除非論一卷契真刋謬論一卷闕優劣論一卷辨方正惑論一卷辨疑論一卷闕靈寳脩真論一卷闕元中子三卷闕嶽瀆福地圖一卷闕道書三共五十八部計八十一卷以下原卷四十七太上老君中黄妙經一卷闕太上元通真經三卷闕太洞真經一卷闕黄元經一卷闕天皇經一卷闕靈寳内觀經一卷三一帝君經一卷中黄經一卷金房内經一卷闕紫陽論碧經三卷謹按郡齋讀書志紫陽金碧經二卷崇文目有三卷今逸其一保神經一卷闕保聖長生經三卷闕靈陽經一卷闕神仙服食五炁真經一卷闕五厨經一卷養生適元經一卷闕風露仙經一卷養生經一卷闕胎息定觀經一卷闕定觀經訣一卷闕攝生經一卷闕長生攝養仙經一卷闕黄庭五臟圖一卷闕老子黄庭内視圖一卷闕黄庭内景圖一卷闕黄庭外景圖一卷闕老君道徳經存想圖一卷黄庭經訣一卷闕五帝雜修行圖一卷闕黄庭五臟導引圖一卷闕六氣導引圖一卷四氣攝生圖一卷貞一子保秘訣一卷闕三洞上清貞元子集錄一卷唐司馬承祥修生養訣一卷闕唐孫思邈氣訣一卷煙蘿子服内元氣訣一卷證道胎息服氣絶粒長生訣一卷闕唐張果氣訣一卷養生服氣訣一卷調元氣訣一卷調三元氣訣一卷太和貞氣訣一卷太上貞君告王母服氣胎息令氣通訣一卷中山玉匱神氣訣一卷太元先生炁訣一卷闕服内元氣訣一卷氣經新舊服法三卷闕唐真人氣訣一卷内指通真訣三卷老子五禽六氣訣六卷沈真人服氣長生秘訣八卷闕修養氣經一卷闕王老咽氣經一卷闕服氣口訣一卷闕真氣銘一卷闕服氣經二卷闕神仙抱一法一卷闕調氣養生録一卷闕道書四共八十三部計九十八卷以下原卷四十八太上天帝青童大君傳一卷大道存神五臟論一卷内真通明歌一卷闕神氣養形論秘訣一卷闕九真秘訣一卷闕修真延秘集一卷闕無上元道絶粒訣一卷闕神氣養形論一卷胎息訣一卷不著名氏述五臟容受之數圖胎息訣一卷不著名氏集諸家存神之法達磨胎息訣一卷玉皇聖胎神用訣一卷闕胎息指要一卷闕貞元胎息訣一卷闕修真胎息歌一卷闕胎息元妙一卷闕黄帝玉房秘訣闕黄帝玉櫃訣一卷神仙宻授三一訣一卷闕元珠新鑑詩一卷闕叅同異心鑑一卷闕修真延秘集三卷闕煙蘿子内真通方訣一卷玉真人隂丹訣一卷闕内真妙用訣三卷闕大道形神論一卷闕金液頌一卷金液中還秘訣一卷闕真人十二時修神神丹歌一卷闕隂丹經一卷闕出生入死法一卷闕胎息精微論三卷闕胎息訣六卷闕不著名氏集諸胎息之法養生要錄一卷逍遥秘論一卷闕元珠歌一卷闕攝生纂要錄一卷闕了一歌一卷闕太一真人因命歌一卷闕薛君口訣一卷闕長生秘訣一卷闕新修攝生秘㫖一卷神仙秘訣三論三卷闕易元子一卷闕道樞一卷闕保生纂要一卷闕攝生月令一卷著生論一卷闕隂真君五精論一卷闕形神可固論一卷養生延命錄一卷闕四氣攝生錄一卷闕攝生錄三卷闕攝生纂錄一卷闕養生自慎訣一卷闕大道静神論一卷闕攝養服食禁忌一卷闕傳命寳銘一卷闕修真府元洞幽訣一卷闕遵成壁忌訣一卷闕脩行要訣一卷闕頥神論一卷停厨丸方一卷至言一卷闕谷神賦一卷谷神妙訣三卷服餌仙方一卷茅君静中吟一卷谷神記一卷指元篇一卷闕混谷頥生錄二卷闕孫思邈枕中記一卷軒轅黄帝導引法一卷闕按摩要法一卷羅浮山石壁記一卷闕繕生養性法一卷闕九真中經二卷老子心鑑一卷繕生集畧一卷道書五共五十八部計八十四卷以下原卷四十九太丹黄帝隂符經一卷闕隂符太丹經一卷隂符經元義一卷玉清内書二卷黄帝九鼎神丹經訣十卷闕老君八純元鼎經一卷太上真君石室秘訣服食還丹騐法一卷闕龍虎上經金丹訣一卷闕三皇經三卷五金髓經一卷日月混元經一卷龍虎上經金碧潛通訣三卷還丹金術黄老經一卷闕太洞鍊真寳經修服丹砂妙訣一卷闕太清石壁記三卷隂陽統畧周易叅同契三卷闕叅同契太易志圖一卷闕張處撰參同契太易志圖一卷闕重元子注參同契太易二十四氣修煉大丹圖一卷闕參同契太易丹書一卷闕太易丹書一卷闕太易隂陽備訣手鑑圖一卷闕丹華經一卷闕太洞鍊真寳經一卷闕五相類一卷闕太丹記一卷闕太丹九轉歌訣一卷指黄芽成大還丹歌三十首一卷闕中還丹糝製術一卷闕金虎元君訣一卷闕還金丹訣三卷闕土兌訣三卷闕龍虎丹一卷闕五金龍虎歌一卷闕龍虎太丹訣一卷闕爐鼎要妙粉圖經一卷闕金液丹秘訣一卷金木萬靈訣一卷靈砂聖石玉露丹訣一卷闕剛子丹訣一卷闕不著名氏集諸家剛子丹訣一卷張道陵撰五金龍虎歌一卷元君肘後方三卷大還丹金虎白龍論一卷闕秦鑑語一卷闕蓬壺集三卷草衣子還丹契秘圖一卷闕還金篇一卷闕㸃假騐真一卷闕大丹歌一卷張果進服丹砂訣一卷闕七返靈砂歌一卷闕金丹賦一卷闕青霞子龍虎金液還丹通元論一卷太一真人五行重元論一卷日月元樞一卷道書六共五十五部計四十七卷以下原卷五十中元論一卷闕神仙金汋經三卷闕燒煉秘訣一卷元君傳道傳心訣一卷闕道術指歸望江南一卷闕金石相數篇一卷闕金液歌一卷闕證太丹訣一卷闕隂君金木火丹論一卷闕修丹砂狀一卷闕宻州金丹大還丹口訣一卷闕葛仙翁歌訣一卷闕靈砂受氣用藥訣一卷闕龍虎丹訣一卷闕龍虎丹訣别名一卷闕金陵子龍虎還丹訣二卷闕通幽訣一卷闕雜丹訣一卷李真人還丹歌一卷闕金精石液訣一卷闕諸家丹訣一卷闕上清真秘訣一卷闕注金丹訣一卷闕還金丹訣三卷闕金丹真訣一卷闕金液丹秘訣一卷闕金液指掌論一卷闕得一歌一卷闕龍虎通元訣一卷闕道術藥經絡歌一卷闕大藥秘盟了議口訣一卷闕五經雜訣二卷闕王君立制丹砂訣一卷闕茅魏真人詩一卷闕訟求五行圖一卷大丹至論一卷闕修真立騐抄并圖一卷闕九轉真訣一卷闕羅公逺記一卷真儀總鑑三卷闕龍虎亂日篇一卷靈砂受氣用藥訣一卷闕大丹龜鑑一卷太白山十練聖石神妙經二十一轉訣一卷闕麻姑歌一首闕孤剛子粉圓四卷唐朝鍊大丹感應頌一卷闕龍虎大還丹訣一卷陶真人金丹訣一卷神丹經訣十卷闕金水萬靈訣一卷闕魏伯陽感應訣一卷闕龍虎還丹通元要訣二卷闕明真證道論一卷闕懸解錄一卷崇文總目卷九
