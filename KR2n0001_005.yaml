front:
  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR2n0001_WYG_005-1a, image: WYG0674/WYG0674-0056a.png}
body:
  text: 崇文總目卷五宋王堯臣等撰儒家類以下原卷二十四仲尼之業垂之六經其道閎博君人治物百王之用微是無以為法故自孟軻揚雄荀况一作卿之徒又駕其說扶而大一作本之歷世諸子轉相祖述自名一家異端其言或破碎於大道然計其作者之意要之孔氏不殊焉共四十四部計三百二十卷晏子春秋十二卷晏子八篇今亡此書蓋後人採嬰行事為之以為嬰撰則非也曽子二卷孟子十四卷趙岐注孟子七卷闕陸善經注善經唐人以軻書初為七篇因刪去趙岐章㫖與其注之繁重者復為七篇云續孟子二卷林慎思撰慎思以為孟子七篇非軻著書而弟子共記其言不能盡軻意因傳其說演而續之荀子二十卷荀卿子十二卷魯仲連子五卷賈子九卷漢賈誼傳本七十二篇劉向刪定為五十八篇隋唐皆九卷今别本或為十卷太𤣥經十卷揚子法言十三卷李軌注揚子法言十三卷栁宗元注說苑五卷漢劉向撰向成帝時典祕書採傳記百家之言掇其正辭美義可為勸戒者以類相從為說苑二十篇今存者五卷餘皆亡續說苑十卷唐劉貺撰以劉向著說苑二十篇時漢史未行故漢事頗缺貺因採其所遺亡凡十篇云新序十卷漢劉向撰成帝時典校祕書因採載戰國秦漢間事為三十卷上之其二十卷今亡鹽鐵論十卷潛夫論十卷中論六卷中說十卷帝範一卷青宫要記十卷闕臣軌二卷修身要覽十卷闕百行章一卷君臣政理論三卷聖典三卷闕伸䝉子三卷康教論一卷貞禮一卷闕元子二十卷理源二卷皇王大政論一卷鯫子一卷闕前朝君臣正論二十五卷資理論三卷闕本說十卷素履子一卷闕里訓十卷東管子十卷闕儒門誡節忠經三卷闕中庸論一卷商子新書三卷李子正解十卷闕尹子五卷道家類以下原卷二十五道家者流本清虛去健羡泊然自守故曰我無為而民自化我好靜而民自正雖聖人南面之術不可易也至或不究其本棄去仁義而歸之自然以因循為用則儒者病之共三十六部計一百七十二卷鬻子一卷老子道德經二卷河上公注道德經二卷闕不著姓名老子道德經二卷王弼注道德經二卷唐明皇注道德疏六卷闕道德經傳四卷唐陸希聲撰傳疏道德二經義老子道德經開題序訣義疏七卷闕道德經廣聖義三十卷闕唐杜光庭撰以明皇注疏演其義道德經疏二卷不著撰人名氏集河上公葛仙翁鄭思逺唐睿宗明皇諸家注序其自疏道德經疏義節解上下各二卷闕僞蜀喬諷撰諷仕僞蜀為諫議大夫知制誥奉詔以唐明皇注疏杜光庭義綴其要附以己意解釋之老子道德經譜二卷闕道士扶小明撰不詳何代人以道德經章句略為義訓老子道德經小解二卷闕不著撰人名氏注解道德經義列子冲虛至德真經八卷文子十一卷闕徐靈府注文子十二卷李暹注亢倉子三卷莊子十卷補注莊子十卷南華真經篇目義三卷闕鶡冠子三卷今書十五篇述三才變通古今治亂之道唐世嘗辨此書後出非古所謂鶡冠子者集注陰符經一卷闕自太公而下注傳尤多今集諸家之說合為一書若太公范蠡鬼谷子諸葛亮張良李筌李合李鑒李鋭楊晟凡十一家自淳風以下皆唐人又有傳曰者不詳何代人太公之書世逺不傳張良本傳不云著書二說疑後人假托云又有陰符經叙一卷不詳何代人叙集太公以後為陰符經注者凡六家并以惠光嗣等傳附之陰符經一卷陰符機一卷唐李靖撰以謂陰符者應機制變之書破演其說為陰符機又有勢滋及論合三篇陰符經太無傳一卷陰符經辨命論一卷唐張果傳或曰果於道藏得此傳不詳何代人所作因編次而正之今别為古字蓋當時道書所得之本也驪山母傳陰符元義一卷陰符經要義一卷闕陰符經正義一卷闕唐韋洪撰黃帝陰符經辨命論一卷闕陰符經小解一卷闕𤣥解先生撰不詳何代人陰符天機經一卷闕唐李筌撰自號少室山逹觀子筌好神仙嘗於嵩山虎口巖石壁得黃石陰符本題云魏道士寇謙之𫝊諸名山筌雖略抄記而未曉其義後入秦驪山逢老母傳授抱朴子內篇二十卷孫子十卷無能子三卷陰符九經元談二卷法家類以下原卷二十六法家者流以法繩天下使一本於其術商君申韓之徒乃推而大之挾其說以干世主收取功名至其尊君抑臣辨職分輔禮制於王治不為無益然或狃細苛持深刻不可不察者也共六部計六十五卷管子十八卷劉向校管子一十九卷唐國子博士尹知章注按吳兢書目凡三十卷自存十九卷自形勢解篇而上十一卷亡又有管氏指略二卷唐杜佑撰采管氏章句之要為十篇云管氏指略二卷商子五卷慎子一卷謹按直齊書録解題云崇文總目言三十七篇韓子二十卷名家類名家者流所以辨核名實流别等威使上下之分不相踰也仲尼有云必也正名乎言為政之大本不可不正者也共五部計一十卷尹文子二卷鄧析子一卷鄧析子戰國時人漢志二篇初析著書四篇劉歆有目有一篇凡五歆復校為二篇公孫龍子一卷人物志三卷廣人物志三卷墨家類墨家者流其言貴儉兼愛尊賢右鬼非命上同此墨家之所行也孟子之時墨與楊其道塞路軻以墨子之術儉而難遵兼愛而不知親疏故辭而闢之然其彊本嗇用之說有足取焉共二部計一十六卷墨子十五卷董子一卷縱橫家類春秋之際王政不明而諸侯交亂談說之士出於其間各挾其術以干時君其因時適變當權事而制宜有足取焉一部三卷鬼谷子三卷雜家類雜家者流取儒墨名法合而兼之其言貫穿衆說無所不通然亦有補於治理不可廢焉共三十九部計四百二十二卷吕氏春秋三十六卷孔叢子七卷新語二卷淮南子二十一篇許慎注髙誘注仲長子昌言三卷漢仲長統撰按本傳統論說古今及時俗行事著論名昌言凡三十四篇十餘萬言隋唐書目十卷今所存十五篇分為三卷餘皆亡論衡三十卷傅子五卷晋傅休奕撰集史經治國之說評斷得失各為區例本傳載內外中篇凡四篇亡録合一百四十篇今亡一百一十七抱朴子外篇二十卷古今注三卷續古今注三卷古今善言二十卷金樓子一十卷子抄三十卷意林三卷劉子三卷理道集十卷闕帝王略論三卷理道要訣十卷十代興亡論十卷古今精義十五卷闕致理書十卷致書十卷闕牧宰政術二卷檢志三卷兩同書二卷唐羅隱撰采孔老二書著為內外十篇以老子修身之說為內孔子治世之道為外㑹其㫖而同元治亂集三卷闕子書要略一卷法語二十卷古今語要十二卷格言五卷帝道書十卷闕公侯正術十卷闕魯人初撰蓋魯人名初不著其姓氏未詳何代人帝王㫖要一卷闕五書一卷正訓十卷闕不著撰人名氏按唐志有正訓二十卷辛德源撰而此書云陸機撰又止十卷据隋以前書録皆無陸機正訓之目晋史機𫝊亦不言嘗有此書而德源所著今世已亡疑是其遺書歷代紀要五十卷闕導言略三卷闕正性論一卷闕農家類農家者流衣食之本原也四民之業其次曰農稷播百穀勤勞天下功炳後世著見書史孟子聘列國陳王道未始不究耕桑之勤漢興劭農勉人為之著令今集樹藝之說庶取法焉共八部計二十四卷齊民要術十卷兆人本業三卷山居要術三卷大農孝經一卷農家切要一卷闕農子一卷闕淮南王蠶經三卷闕孫氏蠶書二卷小說類以下原卷二十七書曰狂夫之言聖人擇焉又曰詢於芻蕘是小說之不可廢也古者懼下情之壅於上聞故每嵗孟春以木鐸徇於路採其風謡而觀之至於俚言巷語亦足取也今特列而存之小說上共七十部計二百八十八卷世說十卷謹按郡齊讀書志云唐藝文志劉義慶世說八卷劉孝標續十卷而崇文總目止載十卷當是孝標續義慶元本八卷通成十卷耳小說十卷辨疑志三卷兩同書一卷乾􅍧子三卷演義十卷刋誤二卷炙轂雜録五卷忠烈圖一卷唐說纂四卷五經評判六卷闕芻蕘論三卷續論衡三十卷闕通論五卷闕本書三卷闕雜說六卷三教論一卷顔氏家訓七卷家範一卷闕開元御集誡子書一卷闕六誡一卷闕盧公範一卷闕誡子拾遺四卷家學要録二卷先賢誡子書二卷闕古今家誡一卷闕誡文書一卷闕正順孝經一卷闕孝感義聞録三卷闕家誡一卷闕談藪八卷中樞龜鑑一卷酉陽雜爼三十卷廬陵官下記二卷托言十五卷盧言雜說一卷雲溪友議三卷劇談録二卷幽閒鼓吹一卷戎幕閒談一卷因話録二卷資暇録三卷玉溪編事三卷闕耳目記二卷鄭氏談綺一卷釋常談一卷闕初舉子一卷闕野人閒話五卷洛陽搢紳舊聞記五卷事始三卷續事始五卷馮鑑撰謹按新唐書藝文志劉睿續事始三卷崇文總目闕燕丹子三卷博物志十卷猗玕子一卷平泉山居草木記一卷通微子十物志一卷闕感應類從譜一卷闕感應經三卷闕化書六卷靈圖感應歌一卷闕造化權衡六卷前定録一卷定命録二卷闕報應録三卷廣前定録七卷闕警戒録五卷闕竒應録三卷闕續定録一卷闕科名定分録七卷感定命録一卷闕崇文總目卷五
