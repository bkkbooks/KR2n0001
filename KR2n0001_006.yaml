body:
  text: 崇文總目卷六宋王堯臣等撰小説下共七十九部計二百九十卷以下原卷二十八神異經二卷述異記二卷續齊諧記三卷還寃志三卷元怪録十卷續元怪録十卷闕宣室志十卷嶺表録異三卷瀟湘録十卷異聞集十卷洽聞集一卷集異記三卷紀聞十卷異聞志三卷嶺南異物志一卷窮神祕苑十卷窮神記十卷通幽記三卷謹按永樂大典云新唐志陳邵通幽記一卷宋志一作三卷崇文總目闕獨異記十卷續卓異志一卷傳竒三卷大唐竒記十卷纂異記一卷周子良冥通録三卷補江總白猿傳一卷謹按郡齋讀書志云崇文目以為唐人惡歐陽詢者為之貫怪圖二卷通集録異二十卷闕湘湖神仙顯異二卷聞竒録三卷闕博異志三卷闕搜神總記十卷不著撰人名氏録異記十卷異僧記一卷闕離魂記一卷妖怪録五卷冥洪録一卷稽神録十卷廣唐卓異記三卷洛中紀異十卷教坊記一卷開元平一卷八駿圖一卷闕古今刀劍録一卷古今鼎録一卷古鑑記一卷銅劍讃一卷欹器圖一卷異魚圖一卷竹譜一卷筍譜一卷竹經三卷茶記二卷闕煎茶水記一卷採茶録一卷闕茶譜一卷北苑茶録三卷花木録七卷花品一卷漆經三卷錢神論一卷錢譜一卷續錢譜一卷鑄錢故事一卷謹按鄭樵通志云貨泉之書農家類也崇文四庫並以貨泉為小説家海潮記一卷闕海潮論一卷海説會最三卷正元飲異三卷醉鄉日月三卷醉鄉小略五卷闕令圃芝蘭集一卷闕庭萱譜一卷闕笑林三卷何自然撰笑林三卷路氏撰會昌解頥四卷開顔集三卷武孝經一卷女孝經一卷忠經一卷酒孝經一卷兵家類以下原卷二十九周禮夏官司馬掌軍戎以九伐之法正邦國書之洪範八曰師易之繫辭取諸睽此兵之所由始也湯武之時勝以仁義春秋戰國出竒狃變其術無窮自田齊始著司馬之法漢興張韓之徒序次其書武帝之時楊僕又捃托之謂之紀奏孝成命任宏乃以權謀形勢陰陽技巧析為四種繇是兵家之文既修列矣然而司馬之法本之禮讓後世莫行焉惟孫武之書法術大詳考今之列非特四種又雜以卜筮刑政之説存諸篇云共六十部計一百一十六卷司馬兵法三卷尉繚子五卷謹按鄭樵通志尉繚子兵書也班固以為諸子類置於雜家隋唐因之至崇文目始入兵書類孫子一卷魏武帝注孫子一卷蕭古注孫子一卷闕陳皥注孫子一卷闕賈林注孫子二卷何延錫注吳子一卷六韜六卷黃石三略三卷真人水鑑十二卷軍謀前鑑十卷闕兵家正史九卷統軍臨轄祕䇿一卷闕裴子新令二卷新集兵書要訣三卷闕長慶人事軍律三卷行師類要七卷闕李筌青囊括一卷神機武略兵要望江南詞一卷太白隂經二卷闕清邊前要五十卷見管子十卷謹按此五字有脫訛無本可證韜珠祕訣十卷闕韜鈐祕録一部五卷闕謹按此條多出一部二字原本如此無本可證衛國公手記一卷闕鑒川漁子吟風詩一卷闕軍誡三卷決勝孤虛集一卷周易占兵一卷闕行軍月令一卷五行陳圖一卷闕戰勝歌一百首一卷諸葛亮兵機法五卷闕諸葛亮武侯十六䇿一卷軍軌兵鈐祕訣三卷闕神兵苑三卷闕兵論十卷闕六十甲子行軍法一卷兵機將略論十卷闕彭門玉帳一卷出軍祕略一卷闕會稽兵家術日月占一卷闕兵書萬勝訣二卷闕至德元寶玉函經十卷闕契神經一卷闕兵書論語三卷闕統戎式鑑二卷闕握鑒方三卷闕定逺安邊䇿三卷白起神妙行兵法三卷闕六甲五行用軍法一卷闕要訣兵法立成歌一卷闕六甲攻城破敵法一卷闕馬前祕訣兵書一卷闕靈關訣二卷闕預知歌一卷闕太乙厭􅓙法一卷闕太乙行軍六甲􅓙厭詩一卷闕類書類以下原卷三十謹按此類以下歐陽修集無敘釋類書上共四十六部計一千六百五十卷太平御覽一千卷太平廣記五百卷謹按鄭樵通志校讐略泛釋無義論一篇云古之編書但標類而己未嘗注解其著注者人之姓名耳蓋經入經類何必更言經史入史類何必更言史但隨其凡目則其書自顯惟隋志於疑晦者則釋之無疑晦者則以類舉今崇文總目出新意每書之下必著説焉據標類自見何用更為之説且為之説也已自繁矣何用一一説焉至於無説者或後書與前書不殊者則強為之説使人意怠且太平廣記者乃太平御覽别出廣記一書専記異事奈何崇文之目所説不及此意但以謂博採羣書以類分門凡是類書皆可博採羣書以類分門不知御覽之與廣記又何異崇文所釋大概如此舉此一條可見其他朱彛尊曰崇文總目當時撰定諸儒皆有論説凡一書大義為舉其綱法至善也其後若郡齋讀書志書録解題等編咸取法於此故雖書有亡失而後之學者覽其目録猶可想見全書之本末焉乃夾漈鄭氏謂崇文目每書之下必著説據標類自見何用更為之説使人意怠於是紹興中改定此書僅存六十六卷之目悉去論説書之散佚者學者遂無由知撰述之本旨矣册府元龜一千卷天和殿御覽四十卷彤管懿範七十卷修文殿御覽三百六十卷玉府新書三卷闕麟角一百二十卷闕北堂書抄一百七十三卷闕通典二百卷續通典二百卷會要四十卷會要四十卷唐會要一百卷會要三十卷集類一百卷集類略三十卷事鑑五十卷闕類林十卷唐書類苑二卷闕十九書語類十卷闕新修唐朝事類十卷闕羣書數類一卷闕九經類義二十卷闕藝文類聚一百卷初學記三十卷六帖三十卷王氏千門四十卷闕編珠五卷鹿門家抄九十卷備舉文言二十卷警年十卷詞圃十卷穿楊集四卷瀛類十卷闕蒙求三卷續蒙求三卷闕唐蒙求三卷闕蒙求二十卷闕系蒙求十卷闕羣書系蒙求三卷闕韻對十卷四庫韻對九十八卷闕類書下共五十一部計八百六十五卷以下原卷三十一資談六十一卷史海十卷闕學海二十卷應用類對十卷闕雕金集十卷闕王氏屬對十卷闕經史事對十卷修文海十七卷闕屬文寶海一百卷闕文鑑五卷闕戚苑十卷闕戚苑英華十卷內範要略十卷闕記室新書三十卷文華心鑑六卷闕玉英二卷經典正要三卷闕修文異名録十卷闕國朝類要十五卷諸子談論三卷語麗十卷白氏傳家記二十卷闕王論家要四卷闕錦繡谷五卷闕玉屑二卷廣要新書三卷闕雕玉集二十卷闕碎金抄十卷闕繡囊五卷闕儒林碎寶二卷闕羊頭山記十卷闕書列幽燭四十卷闕典要三卷闕軺車事類三卷闕春秋要類五卷闕春秋義鑑三十卷闕名字族十卷闕嵗時廣記一百二十卷謹按鄭樵通志云嵗時自一家書如嵗時廣記崇文總目不列於嵗時而列於類書何也纍玉集十卷闕寶鑑絲綸二十卷闕要覽二卷童子洽聞一卷文選抄十二卷羣書解題八十卷闕門類解題十卷仙鳬羽翼三十卷青宫懿典十五卷闕翰苑七卷搢紳集二卷算術類以下原卷三十二共三十一部計七十九卷周髀算經二卷九章算術九卷闕九章算草九卷九章算經要略一卷闕五經算術二卷緝古算經一卷張立建算經三卷夏侯陽算經一卷海島算經一卷五曹算經五卷孫子算經一卷闕三問田算術一卷闕謝察微算經三卷闕新術五曹時要術三卷闕心機算術括一卷闕明徴算經三卷闕法算機要賦一卷闕增成玄一算經三卷闕一位算法二卷闕一位算法問答一卷闕算法祕訣一卷五曹乘除見一切例算法一卷闕龍爰算法二卷闕求一算法三卷闕得一算經七卷闕算術玄要一卷闕解注求一化零歌一卷闕算法三平化零歌一卷闕算口訣一卷闕潁陽書三篇數術記遺一卷藝術類以下原卷三十三共五十四部計九十八卷射經一卷王琚注射法一卷射口訣一卷射書十五卷闕射鑑九圖一卷闕射經四卷闕不著姓氏射記一卷闕九章射術三卷闕任權弓箭論一卷闕弓訣一卷闕射法指訣一卷闕九鑑射經一卷闕晝品録一卷闕唐畫斷三卷後畫品一卷梁朝畫目三卷畫評一卷不絶筆畫圖一卷益州名畫録三卷書品録一卷闕歷代名畫記十卷荆浩筆法記一卷碁訣一卷葛洪碁經一卷闕碁術要訣一卷闕奕碁經一卷闕金谷園九曲局譜一卷金谷園九局圖一卷闕碁圖義例一卷碁勢圖一卷碁勢一卷碁圖一卷投壺經一卷骰子選格三卷編金葉子格一卷新修採選格一卷新定編金葉子格一卷闕繫蒙小葉子格一卷闕尋仙採選七卷闕小葉子例一卷闕樗蒲經采選七卷闕周穆王相馬經三卷闕辨飬良馬論一卷闕馬齒口訣一卷闕辨馬圖一卷醫馬經一卷馬經一卷相鶴經一卷東川白氏鷹經一卷鷹鷂五藏病源一卷闕論駝經一卷醫駝方一卷闕崇文總目卷六
