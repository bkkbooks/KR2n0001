body:
  text: 崇文總目卷二宋王堯臣等撰春秋類以下原卷五昔周法壊而諸侯亂平王以後不復雅而下同列國吳楚徐夷並僭稱王天下之人不禀周命久矣孔子生其末世欲推明王道以扶周乃聘諸侯極陳君臣之理諸侯無能用者退而歸魯即其舊史考諸行事加以王法正其是非凡其所書一用周禮爲春秋十二篇以示後世後世學者傳習既久其說遂殊公羊髙糓梁赤左邱明鄒氏夹氏分爲五家鄒夹最微自漢世已廢而三家盛行當漢之時易與論語分爲三詩分爲四禮分爲二及學者散亡僅存其一而餘家皆廢獨春秋三傳並行至今初孔子大修六經之文獨于春秋欲以禮法繩諸侯故其辭尤謹約而義微隱學者不能極其說故三家之傳于聖人之旨各有得焉太史公曰爲人君者不可不知春秋豈非王者之法具在乎共三十三部計三百九十六卷春秋經傳集觧三十卷春秋公羊經傳觧語二十二卷春秋糓梁傳十二卷春秋外傳國語二十一卷左丘明撰呉侍中領左國史亭陵侯韋昭觧昭參引鄭衆賈逵虞翻唐因二人皆吳臣合凡五家爲注自所發正者三百十事春秋繁露十七卷漢膠西相董仲舒撰按仲舒本傳說春秋事得失聞舉玉杯蕃露清明竹林之屬數十篇十餘萬言觧者但謂所著書名而隋唐志繁露卷目與今正同案其書盡八十二篇義引宏博非出近世然其間篇第亡舛無以是正又即用玉杯竹林題篇疑後人取而附著云春秋決事比十卷闕漢董仲舒撰丁氏平黃氏正初仲舒既老病致仕朝廷每有政議武帝數遣廷尉張湯問其得失于是作春秋決疑二百三十二事動以經對至吳太史令呉汝南丁季江夏黄復平正得失今頗殘逸止有七十八事左氏膏肓九卷漢司空掾何休始撰答賈逵事因記左氏所短遂頗流布學者稱之後更删補爲定今每事左方輙附鄭康成之學因引鄭說竄寄何書云書今殘逸第七卷亡春秋釋例十五卷凡五十三例春秋述議一卷闕春秋正義三十六卷唐國子祭酒孔頴達按漢張蒼賈誼尹咸鄭衆賈逵皆爲詁訓然叅用公糓二家至晉杜預專治左氏其後有沈文阿蘇寛劉炫皆據杜說貞觀中頴逹據劉學而損益之長孫無忌等又復損益其書乃定皇朝孔淮等奉詔是正春秋糓梁䟽三十卷唐國子四門助教楊勛撰皇朝邢昺等奉詔是正令太學傳授春秋公羊䟽三十卷不著撰人名氏援証淺局出於近世或云徐彦撰皇朝邢昺等奉詔是正始令太學傳授以偹春秋三家之旨春秋左氏傳序一卷闕隂洪道注集傳春秋微旨二卷集傳春秋辯疑七卷唐給事中陸淳纂初淳以三家之傳不同故采獲善者叅以啖助趙匡之說爲集傳春秋又本褒貶意爲㣲旨條别三家以朱墨記其勝否又摭三家得失與經戾者以啖趙之說訂正之爲辯疑非國語二卷栁宗元撰春秋加减一卷唐元和時國子監承詔修定以此經字文多少不同故誌其増損以防差駮春秋指掌十五卷唐試左武衛兵曹李瑾撰瑾集諸家之說爲序義凡例各一篇稱孔頴達正義爲五篇采摭餘條爲碎玉一篇集先儒異同辯正得失爲三篇取劉炫規過中證其義爲三篇大抵專依杜氏之學以爲說云春秋通例三卷唐陸希聲撰因三家之例裁正其冗以通春秋之旨折𠂻春秋三十卷唐陳岳撰以三家異同三百餘條叅求其長以通春秋之意春秋圖五卷唐張傑撰以春秋所載車服器用都城井邑之制繢而表之春秋指元十卷闕唐張傑撰摘左氏傳文中釋其義春秋精義三十卷不著撰人名氏彚事于上分抄杜氏孔頴達言數家之說叅釋文演左氏傳諡族圖五卷不著撰人名氏以左氏學世譜増廣之貫穿系序差無遺略春秋名號歸一圖二卷僞蜀馮繼先撰以春秋官諡名字裒附初名之左左氏傳引帖斷義十卷闕僞蜀進士蹇遵品撰擬唐禮部試進士帖經舊式敷經具對春秋論一卷皇朝袐書監胡旦撰多摭杜氏之失有裨經旨春秋龜鑑一卷不著撰人名氏述春秋周及諸侯世次齊魯大國公子公孫初不詳備其後傳寫又失其次序今存以備討閲春秋世譜七卷不著撰人名氏凡七卷起黄帝至周見于春秋諸國世系傳久稍失其次矣按隋唐書目春秋大夫世族譜十三卷顧啟期撰而杜預釋例自有世族譜一卷今書與釋例所載不同而本或題云杜預撰者非也疑此乃啟期所撰云帝王歴紀譜二卷不著撰人名氏其序言周所封諸侯子孫散于他國孔子修春秋而譜其世系上採帝王歴紀而條次之盖學春秋所録今本題云荀卿撰者非也春秋纂要十卷闕僞唐人姜􅐚嗣撰以春秋左氏公糓三家之傳學者抄集之文謹按此下似有脫文謹按文獻通考引此作春秋纂例宋志作纂要春秋集傳十五卷皇朝王沿纂沿患學者自私其家學而是非多異失聖人之意乃集三傳之說删爲一書又見祕書目有先儒春秋之學頗多因啟求之得董仲舒等十餘家㳂自以先儒猶爲未盡者復以己意箋之春秋宗族名諡譜五卷闕不著撰人名氏略採春秋三傳諸國公卿大夫姓名諡號孝經類以下原卷六謹按歐陽脩集叙釋缺共五部計九卷古文孝經一卷漢侍中孔安國註班固藝文志有孝經古文孔氏一篇二十二章本出屋壁中前世與鄭康成註並行今孔註不存而𨽻古文與章數存焉孝經一卷鄭康成注先儒多疑其書唯晉孫㫤集觧以此註爲優請與孔註並行詔可今太學所立陸德明釋文與此相應五代兵興中原久逸其書咸平中日本增以此書來獻議藏祕府謹按直齋書錄觧題崇文總目以爲日本國僧奝然所獻孝經一卷唐明皇注取王肅劉劭虞翻韋昭劉炫陸澄六家之說參倣孔鄭舊義今行于太學孝經䟽三卷元行冲撰明皇既作註故行冲奉詔作䟽謹按永樂大典引此作孝經䟽五卷闕孝經正義三卷皇朝翰林侍講學士邢昺等撰初世傳行冲䟽外餘家尚多皆猥俗褊陋不足行逺咸平中詔昺及杜鎬等集諸儒之說而增損焉論語類論語者盖孔子相與弟子時人講問應答之言也孔子卒羣弟子論次其言而撰之漢興傳者三家魯人傳之謂之魯論齊人傳之謂之齊論而齊論增問王知道二篇今文無之出於孔子壁中者則曰古論有两子張是三家者篇第先後皆所不同考今之次即所謂魯論者也共一十三部計二百一十卷論語十卷謹按永樂大典引此作集觧論語十卷論語䟽十卷謹按永樂大典引此作皇侃論語義䟽十卷論語正義十卷論語井田義圖一卷闕不著撰人名氏述周井田之法其曰論語者盖爲論語學者引用云孔子家語十卷白虎通德論十卷後漢班固撰章帝建初四年詔諸儒㑹白虎觀講議五經同異詔集其事凡十四篇五經鉤沉五卷闕晉楊方撰答難申暢自謂鈎取五經之沉義篇第亡缺今缺五篇刋謬正俗八卷唐秘書監顔師古撰采先儒及當世之言叅質訛謬而矯正之未終篇而師古殁其子始上之詔録藏秘閣謹按鄭樵通志云刋謬正俗乃雜記經史惟第一篇起論語而崇文總目以爲論語類應知崇文所釋不㸔全書多只㸔帙前數行率意以釋之耳刋謬正俗當入經觧類其說甚允然白虎通五經鈎沉及六說以下七書均不詮釋論語何獨此書疑夲有經觧一門以白虎通爲首而佚其標題也又按匡謬正俗匡改爲刋避宋太祖諱也直齋書錄觧題又引作糺謬正俗又别有刋謬正俗跋八卷莆田鄭樵撰六說五卷唐右補闕劉迅作六書以繼六經故標槩作書之誼而著其目惟易闕而不叙經史釋題二卷闕唐李肇撰起九經下止唐氏實録列篇帙之凡槩釋其題授經圖三卷闕不著撰人名氏叙易詩書禮春秋三家論語孝經之學師承相第系而爲圖九經餘義一百卷闕皇朝處士黃敏撰摭諸家之說是非者裁正之演聖通論三十六卷皇朝祕書監致仕胡旦撰以易詩書論語先儒傳註得失叅糅故作論而辯正之易百篇書五十六篇詩七十八篇論語十八篇凡二百五十二天聖中獻之小學類以下原卷七古者教學之法八歲而入小學以習六甲四方書數之藝至於成童而後授經儒者䆒極天地人神事物之理無所不通故其學有次第而後大成焉爾雅出於漢世正名命物講說者資之於是有訓詁之學文字之興隨世轉移務趨便省久後乃或亡其本三蒼之說始志字法而許慎作說文於是有偏傍之學五聲異律清濁相生而孫炎始作字音於是有音韻之學篆𨽻古文爲體各異秦漢以來學者務極其能於是有字書之學先儒之立學其初爲法未始不詳而明而後世猶或訛失故雖小學不可闕焉小學上共二十八部計三百卷爾雅三卷小爾雅一卷爾雅音訓二卷不著撰人名氏以孫炎郭璞二家音訓爲尚狭頗益增之爾雅正義十卷方言十三卷漢揚雄子雲撰晉郭璞注今世所傳文或繆缺與先儒所引時有差云釋名八卷辨雜名一卷謹按隋志韋昭有辨釋名一卷此雜字疑誤廣雅音一卷謹按永樂大典云宋志張揖廣雅音三卷崇文總目同博雅十卷義訓十卷經典釋文三十卷唐陸德明撰德明爲國子博士以先儒作經典音訓不列註傳全錄文頗乖詳略又南北異區音讀罕同乃集諸家之讀九經論語老莊爾雅者皆著其飜語以增損之五經文字三卷初張叅拜詔與儒官校正經典乃取漢蔡邕石經許慎說文吕忱字林陸德明釋文命孝亷生顔傳鈔撮疑互取定儒師部爲一百六十非緣經見者略而不集九經字様一卷唐翰林待詔唐元度撰開成中元度奉詔覆定太學石經字文以來補張參之闕更作九經字様爲七十六經典分毫正字一卷唐太學博士歐陽融撰辨正經典字文使不得相亂篇帙今闕全篇止春秋中帙餘篇悉亡說文二十卷說文字源一卷唐李騰集初李陽冰爲滑州節度使李勉篆新驛記賈耽鎮滑州見陽冰書歎其精絶因命陽冰姪騰集許慎說文目錄五百餘字刋于石以爲世法云說文觧字繫傳三十八卷徐鍇撰謹按徐鍇依前姜䖍之例宜有僞唐字鍇卒於圍城中未入宋也說文觧字韻譜十卷急就章一卷說文觧字十五卷徐鉉等校定玉篇三十卷像文玉篇二十卷闕唐釋慧力撰據顧野王之書裒益衆說皆標文示象玉篇觧疑三十卷闕道士謝利貞撰刪略野王之說以觧字文重修玉篇三十卷皇朝詔翰林學士陳彭年與史館校勘吳銳直賢院邱雍等重加刋定正俗音字四卷齊黄門侍郎顔之推正時俗文字之謬援諸書爲據凡五十五目干祿字書一卷字源偏傍小說三卷佩觽三卷小學下共二十九部計二百一十九卷以下原卷八唐廣韻五卷韻詮十五卷闕唐韻五卷韻海鑑源十六卷闕切韻十卷闕辨體補修加字切韻五卷闕切韻五卷雍熈廣韻一百卷闕大宋重脩廣韻五卷韻略五卷集韻十卷聲韻圖一卷闕評書一卷千字文一卷書品一卷書後品一卷書法要錄十卷書譜一卷闕書斷論三卷闕書指論一卷闕翰林禁經一卷書錄一卷闕蔡氏口訣一卷墨藪五卷古跡記一卷書隱法一卷筆勢圖一卷臨書關要一卷崇文總目卷二
