body:
  text: 崇文總目目錄類一經籍之屬提要臣等謹案崇文總目十二卷宋王堯臣等奉勅撰葢以四館書併合著録者也宋制以昭文史館集賢為三館太平興國三年於左升龍門東北建崇文院謂之三館新修書院端拱元年詔分三館之書萬餘卷别為書庫名曰秘閣以别貯禁中之籍與三館合稱四館景祐元年閏六月以三館及秘閣所蔵或謬濫不全命翰林學士張觀知制誥李淑宋祁等看詳定其存廢訛謬者則去差漏者補寫因詔翰林學士王堯臣史館檢討王洙館閣校勘歐陽修等校正條目討論撰次定著三萬六百六十九卷分類編目總成六十六卷於慶厯元年十二月己丑上之賜名曰崇文總目後神宗改崇文院曰秘書省徽宗時因改是書曰秘書總目然自南宋以來諸書援引仍謂之崇文總目從其朔也李燾續通鑑長編云崇文總目六十卷麟䑓故事亦同中興書目云六十六卷江少虞事實類苑則云六十七卷文獻通考則云六十四卷宋史藝文志則據中興書目作六十六卷其説參差不一考原本於每條之下具有論説逮南宋時鄭樵作通志始謂其文繁無用紹興中遂從而去其序釋故晁公武讀書志陳振孫書録解題著録皆云一卷是刋除序釋之後全本已不甚行南宋諸家或不見其原書故所記卷數各異也考漢書藝文志本劉歆七略而作班固已有自註隋書經籍志參考七録互註存佚亦沿其例唐書於作者姓名不見紀傳者尚間有註文以資考核後來得略見古書之崖略實縁於此不可謂之繁文鄭樵作通志二十略務欲凌跨前人而藝文一略非目睹其書則不能詳究原委自揣海濵寒畯不能窺中秘之全無以駕乎其上遂惡其害已而去之此宋人忌刻之故智非出公心厥後托克托等案托克托原作脱脱今改正作宋史藝文志紕漏顛倒瑕隙百出於諸史志中最為􅓜脞是即髙宗誤用樵言刪除序釋之流弊也宋人官私書目存於今者四家晁氏陳氏二目諸家藉為考証之資而尤袤遂初堂目及此書則若存若亡幾希湮滅是亦有説無説之明效矣此本為范欽天一閣所蔵朱彛尊抄而傳之始稍見於世亦無序釋彛尊曝書亭集有康熙庚辰九月作是書跋謂欲從六一居士集暨文獻通考所載别抄一本以補之然是時彛尊年七十二矣竟未能辦也今以其言考之其每類之序見於歐陽修集者秖經史二類及子之半馬端臨文獻通考所載論説亦然晁公武讀書志陳振孫書録解題皆在通考之前惟晁志所見多通考一條陳氏則但見六十六卷之目題曰紹興改定者而已永樂大典所引亦即從晁陳二家目中採出無所増益已不能復睹其全然蒐輯排比尚可得十之三四是亦較勝於無矣謹依其原次以類補入釐為一十二卷其六十六卷之原次仍注於各類之下又續宋會要載大觀四年五月秘書監何志同言慶厯間集四庫為籍今按籍求之十纔六七宜頒其名數於天下總目之外别有異書並借傳寫紹興十二年十二月權發遣旴􅇇軍向子固言乞下本省以唐藝文志及崇文總目所闕之書註闕於其下付諸州軍照應搜訪云云今所傳本每書之下多注闕字蓋由於此今亦仍之王應麟玉海稱當時國史謂總目序録多所謬誤黄伯思東觀餘論有校正崇文總目十七條鄭樵通志校讐略則全為攻擊此書而作李燾長編亦云總目或有相重亦有可取而誤棄不録者今觀其書載籍浩繁牴牾誠所難保然數千年著作之目總滙於斯百世而下藉以驗存佚辨真贗核同異固不失為册府之驪淵藝林之玉圃也乾隆四十六年十月㳟校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
