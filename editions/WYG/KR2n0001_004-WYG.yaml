body:
  text: 崇文總目卷四宋王堯臣等撰刑法類以下原卷十七刑者聖人所以愛民之具也其禁暴止殺之意必本于至仁然而執挺刄刑人而不疑者審得其當也故法家之說務原人情極其真僞必使有司不得銖寸輕重出入則其爲書不得不偹歴世之治因時制法縁民之情損益不常故凡法令之要皆著于篇共五十一部計七百一十六卷律十一卷律䟽三十卷律音義一卷開寳刑統三十卷大中刑律統類十二卷闕顯德刑統二十卷闕江南刑律統類十卷唐令三十卷闕梁令三十卷闕開元格十卷闕開成詳定格十卷闕梁格十卷闕後唐長定格一卷闕新長定格三卷闕傍通開元格一卷闕唐開元格令科要一卷判格三卷闕式二十卷闕梁式二十卷闕式苑四卷闕太和格後勅四十卷闕大中刑法總要格後勅六十卷闕度支長行旨五卷闕雜勅三卷闕天成雜勅三卷闕天福編勅三十卷闕建􅂭編勅四卷闕儀制赦書徳音十卷闕景德農田勅五卷闕太平興國編勅十五卷諸路轉運司編敇三十卷闕大中祥符編敇二十卷闕諸路宣􅃯十二卷闕禮部考試進士勅一卷闕天聖編𠡠十二卷一司一務𠡠三十卷闕雜制𠡠三卷闕江南删定條三十卷闕唐律令事類四十卷闕刑法要録十卷闕律令手鑑二卷闕五刑纂經三卷闕法鑑八卷闕刑律總要十二卷闕僞呉删定格令五十卷闕疑獄集三卷金科易覧一卷謹按趙希弁郡齋讀書後志云崇文總目唐趙綽金科易覧一卷律鑑一卷闕法要一卷闕斷獄立成三卷闕外䑓秘要一卷闕地理類以下原卷十昔禹去水害定民居而别九州之名記之禹貢及周之興畫爲九畿而宅其中内建五等之封外撫四􅂽之表職方之述偹矣及其衰也諸侯並爭并吞削奪秦漢以來郡國州縣廢興治亂割裂分屬更易不常至于日月所照要􅂽附叛山川風俗五方不同行師用兵順民施政考于圖牒可以覧焉共八十三部計六百四十七卷山海經十八卷郭璞注按東觀餘論云崇文總目山海經侍中秀領校秀即劉歆也山海經圖十卷舒雅修山海經圖讃二卷闕神異經二卷十州記一卷水經四十卷襄陽耆舊傳三卷南越志七卷呉地記一卷職貢圖一卷青溪山記一卷三齊記一卷十道志十三卷皇華四達記十卷唐國要圖五卷闕諸道行程血脉圖一卷大唐西域記十二卷天寳軍防録一卷西南偹邉録一卷􅃛戞斯朝貢圖一卷四夷朝貢録職貢圖三卷襄沔記三卷渚宫故事十卷投荒録一卷南方異物志一卷桂林風土記三卷北戸雜録三卷閩中記十卷雲南别録一卷南詔録一卷渤海國記三卷闕新羅國記一卷闕諸蕃行記一卷諸道山河地名要略九卷文括九州要略三卷闕蠻書十卷九江新舊録三卷玉笥山記一卷華陽風俗録一卷闕廬山雜記一卷元和國記圖一卷成都記五卷南行録一卷大唐國照圖一卷闕燉煌新録一卷于闐國行程記一卷晉安海物異名記二卷邕管雜記一卷太平寰宇記二百卷歴代宫殿名一百卷九域圖三卷華夷列國入貢圖二十卷闕景德會計録六卷青城山記一卷武夷山記一卷方輿記一百三十卷相州記一卷闕金陵地記一卷闕西域行記一卷十道記一卷郡國志十卷開元分野圖一卷闕雲南行記一卷兩京道里記二卷關中記一卷冀州圖二卷南朝宫苑記二卷歴代宫名一卷湘中記一卷豫章記三卷闕華山記一卷闕湘中山水記三卷茅山記一卷闕諸山記一卷闕三代地理志六卷闕洞庭譜一卷闕岳瀆福地圖一卷闕𤣥中記一卷闕平都山仙都觀記一卷闕新雜地理志九卷闕南嶽衡山記一卷雲南風俗記一卷氏族類以下原卷十九昔黄帝之子二十五人得姓命氏由之德之薄厚自堯舜夏商周之先皆同出于黄帝而姓氏不同其後世封爲諸侯者或以國爲姓至于公子公孫官邑諡族遂因而命氏其源流次叙帝系世本言之甚詳秦漢以來官邑諡族不自别而爲姓又無賜族之禮至于近世遷徙不常則其得姓之因與夫祖宗曲次人倫之記尤不可以不考焉共四十一部計一百一十三卷姓苑十卷唐皇室維城録一卷天潢源𣲖一卷闕唐偕日譜一卷元和縣主譜一卷闕皇孫郡王譜一卷蔣王惲家譜一卷闕李用休家譜一卷闕唐李文家譜一卷闕唐新定諸家譜録一卷闕國朝宰相甲族一卷姓林五卷百家類例一卷元和姓纂十卷系纂七卷闕姓氏韻略六卷闕王氏譜一卷闕竇氏家譜一卷呉郡陸氏宗系譜一卷闕玉牒行樓二卷姓苑略一卷闕類例三卷闕新定徐氏譜圖四卷闕姓氏雜録一卷闕周氏大宗血脉譜一卷編古命氏三卷姓源韻譜五卷劉氏大宗血脉一卷聖朝臣僚家譜一卷闕楊氏家譜一卷闕帝系圖一卷闕趙郡東祖李氏家譜一卷姓氏譜一卷闕姓史四卷闕唐氏譜略一卷唐書總記帝系三卷闕大唐宗室新譜一卷氏族譜一卷闕五姓徴氏二十卷闕唐氏譜略一卷闕尚書血脉一卷闕歲時類以下原卷二十傳曰民生在勤勤則不匱故堯舜南面而治考星之中以授人時秋成春作教民無失周禮六官亦因天地四時分其典職然則天時者聖人之所重也自夏有小正周公始作時訓日星氣節七十二候凡國家之政生民之業皆取則焉孔子曰吾不如老圃至于山翁野夫耕桑樹藝四時之說其可遺哉共十五部計四十二卷國朝時令一卷荆楚歳時記二卷孫氏千金月令三卷保生月録一卷金谷園記一卷時鑑新書五卷四時纂要五卷歲華紀麗二卷四時總要十二卷四時録四卷闕秦中歳時記一卷周書月令一卷闕月令小䟽二卷闕十二月纂要一卷闕齊人月令一卷傳記類以下原卷二十一古者史官其書有法大事書之策小事載之簡牘至于風俗之舊耆老所傳遺言逸行史不及書則傳記之說或有取焉然自六經之文諸家異學說或不同况乎幽人處士聞見各異或詳一時之所得或發史官之所諱叅求考質可以偹多聞焉傳記上共七十八部計三百七十卷穆天子傳六卷漢武帝列國洞𠖇記一卷謹按列國今本作别國列女傳十五卷謹按曽鞏序云崇文總目稱劉向列女傳十五篇曹大家注又按直齋書録觧題云隋唐志及崇文總目皆十五卷盖以七篇分爲上下并頌爲十五卷又按趙希弁郡齋讀書附志云古列女傳八卷劉向撰又一卷莫知其爲誰續然亦載于崇文總目王子年拾遺記十卷廣軒轅本記三卷闕孔子系葉傳三卷髙士傳十卷正始名士傳二卷文士傳十卷謹按永樂大典云裴朏續文士傳十卷崇文總目闕閩中名士傳一卷臨川聖賢名跡傳三卷闕聖賢事跡十三卷髙僧傳十三卷續髙僧傳三十一卷同姓名傳一卷同姓名傳六卷歴代鴻名録八卷闕四公記一卷小名録五卷名賢姓氏相同録一卷闕陶𢎞景傳一卷陶潜傳一卷李宻傳三卷虬髯客傳一卷李靖行述一卷文正公事録一卷文正公故事三卷狄仁傑傳三卷遠祖越公行狀一卷張九齡事跡一卷髙氏外傳一卷闕郭公家傳八卷顔氏行狀二卷闕顔分傳二卷相國鄴侯家傳十卷叚公别傳二卷河東張氏家傳三卷闕尚書故實一卷謹按郡齋讀書志尚書故實一卷唐李綽編崇文目謂尚書即張延賞也綽紀延賞所談故又題曰尚書談録按其書稱嘉貞爲四世祖疑非延賞也新唐書藝文志亦云尚書即張延賞李德裕南行録一卷闕杜悰事跡一卷彭城公故事一卷栁玭訓序一卷魏公家傳三卷闕皇猷録一卷闕皇家親故事二卷國朝傳記三卷國朝舊事四十卷闕封襌故事五卷闕集說一卷景龍文館記十卷異域歸忠傳二卷晉武平呉記二卷闕傳載一卷成都理亂記八卷天祚永歸記一卷驚聼録一卷遣使録一卷闕武成王廟配享事跡三十卷闕北荒君長録三卷闕益州理亂記三卷闕平蜀記一卷西京雜記二卷西京新記五卷豫章古今誌三卷錦里耆舊傳十卷太原事跡十四卷成都府幕石幢録二卷闕潭州刺史大㕔壁記一卷闕蜀記三卷嵩山記一卷零陵録一卷闕杜陽雜編三卷甘澤謡一卷南楚新聞三卷呉興雜記七卷鄴城新記三卷西蕃會盟記三卷闕西戎記二卷闕傳記下共七十三部計四百七十六卷以下原卷二十二選舉志十卷謹按鄭樵通志云唐志以選舉志入職官類是崇文總目以選舉志入傳記非科第録十六卷闕唐顯慶登科記五卷闕唐登科記二卷重定科第録十卷闕諱行録一卷皇宋登科録一卷聖朝登科記三卷貢舉事跡二十卷闕重修登科記三卷闕江南登科記一卷闕文埸盛事一卷唐孝弟録十五卷闕孝弟録二十卷闕廣孝新書五十卷闕孝子拾遺七卷闕陸氏英賢徴記三卷闕呉湘事跡録一卷李渤事迹一卷闕賔佐記一卷常侍言旨一卷先公談録一卷嘉話録一卷輔弼名對四十卷玉泉子見聞真録五卷唐末見聞銘八卷封氏見聞記五卷王氏見聞集三卷闕次桞氏見聞一卷文宗朝偹問一卷金華子雜編三卷三楚新録三卷紀聞譚一卷朝野僉載二十卷皮氏見聞録十三卷符瑞圖十卷李氏朝陵記一卷闕瑞應圖十卷祥瑞録十卷闕許國公勤王録三卷符瑞故實一卷闕稽瑞一卷二十二國祥異記三卷闕湖湘靈怪實録二卷闕六賢圖讃一卷闕仙隱傳十卷江積八仙傳一卷闕江淮異人録三卷傳仙神宗行記一卷闕中台志十卷宰輔名鍳十卷闕翰林盛事一卷閫外春秋十卷漢書隱義十卷闕入洛記十卷王氏東南行記一卷闕南行記一卷王仁裕撰南行記一卷闕李昉撰蜀程記一卷峡程記一卷遊蜀記一卷張氏燕呉行記二卷譚賔録十卷玉堂閑話十卷北夣𤨏言三十卷芝田録一卷壺關録三卷桂苑叢談一卷三水小牘二卷太平雜編二卷闕松牕録一卷英雄録一卷闕國寳傳一卷闕玉璽正録一卷闕目録類以下原卷二十三謹按歐陽修集目録類叙釋闕共十九部計一百七十九卷符瑞圖目一卷闕樂府詩目録一卷文選著作人名目三卷十三代史目十卷闕十九代史目二卷文樞秘要録七卷闕四庫搜訪圖書目一卷闕開元四庫書目四十卷闕唐秘書目四卷闕集賢書目一卷闕唐列聖實録目五十卷後唐統類目一卷闕羣書麗􅇨目録五十卷呉氏西齋書目一卷闕河南東齋史目録三卷闕唐書叙例目録一卷闕新集書目一卷闕天下郡縣書目一卷闕學士院雜撰目一卷闕謹按王應麟玉海云崇文目有目録十九部一百七十九卷始于符瑞圖目一卷終于學士院雜撰目一卷崇文總目卷四
