body:
  text: 崇文總目卷一宋王堯臣等撰易類以下原卷一前史謂秦焚三代之書易以卜筮而得不焚及漢募羣書類多散逸而易以故最完及學者傳之遂分爲三一曰田何之易始自子夏傳之孔子卦象爻彖與文言說卦等離爲十一篇而說者自爲章句易之本經也二曰焦贛之易無所師授自言得之隱者第述隂陽災異之言不類聖人之經三曰費直之易亦無師授專以彖象文言等叅觧卦文凡以彖象文言雜入卦中者自費氏始田何之學施孟梁邱之徒最盛費氏初微止傳民間至後漢時陳元鄭衆康成之徒皆學費氏費氏興而田學遂息古十二篇之易遂亡其本及王弼爲注亦用卦象相雜之經自晉已後弼學獨行遂傳至今然易比五經其來最逺自伏羲畫卦下更三代别爲三易其變卦五十有六命名皆殊至於七八九六筮占之法亦異周之末世夏商之易已亡漢初雖有歸藏已非古經今書三篇莫可䆒矣獨有周易時更三聖世歴三古雖說者各自名家而聖人法天地之藴則具存焉共一十八部計一百七十一卷謹按漢書藝文志隋書經籍志每類之叙與摠數皆在目後馬端臨文獻通考則在目前此書抄本但有總數在前而叙已久失今從歐陽脩集錄此叙而以下各條多採自文獻通考是以姑依通考之式載其數及搃數于每類之首云歸藏三卷晉太尉参軍薛正註隋世有十三篇今但存初經齊毋本著三篇文多闕亂不可詳觧周易一卷鄭康成註今惟文言說卦序卦雜卦合四篇餘皆逸指趣淵確本去聖之未逺周易十卷王弼註周易十卷李鼎􅍈註謹按鼎祚自序稱十八卷唐志作十七卷盖删去所附王弼畧例一卷易緯九卷宋均註周易乾鑿度二卷元包十卷衛元嵩撰元嵩唐人武功蘇原明傳趙郡李江註包以坤爲首因八純之宫以生變極於六十四自繫其辭言外卦體不列爻位以謂易首乾尚文包首坤尚質夏連山商歸藏周易唐包其實一也雖欲馳騁而放言趨理近止易家之區鄙云周易新論傳䟽十卷闕唐隂洪道撰洪道世其父顯之學雜采子夏孟喜等十八家之說參訂其長合七十二篇於易有助云周易正義十四卷唐太尉長孫無忌與諸儒刋定宋朝端拱初國子司業孔維等奉詔是正其言主申王學云周易傳十卷闕此書篇第畧依王式决非卜子夏之文又其言近而不篤然學者尚異頗傳習之周易傳二卷唐右拾遺陸希聲撰希聲作易傳十篇易圖指說釋變徴旨四篇初隴西李阮學其說以爲上下經傳二篇思屬近妙故希聲自爲之觧餘篇差顯不復爲註盖近世之名家歟今二篇外餘篇逸周易舉正三卷唐蘇州司户叅軍郭京撰京世授五經得王輔嗣韓康伯手冩易經比世所行或頗差駁故舉正其訛而著于篇周易物象釋疑一卷唐東鄉助撰取卦互體開釋言象盖未始見康成之學而著此書焉甘棠正義三十卷梁陕州大都督府左司馬任正一撰孔頴達正義申演其說謹按朱彛尊經義考周易甘棠正義三十卷崇文總目任正一撰以孔頴達爲本甘棠者正一爲陕州司馬故名其書據此則文獻通考所引此條孔頴達正義上疑有本字周易口訣義六卷闕河南史證撰不詳何代人其書直抄孔氏說以便講習故曰口訣周易正義補闕七卷闕不著撰人名氏其說自謂禆頴達之闕易論三十三卷王昭素撰周易言象外傳十卷皇朝王洙原叔撰洙以通經侍講天章閣乃集前世諸儒易說折𠂻其理依卦變爲類其論以王弼傳爲内故自名曰外傳書類以下原卷二書原於號令而本之史官孔子刪爲百篇斷堯訖秦序其作意􅇜秦之故孔子末孫惠與濟南伏勝各藏其本于家楚漢之際勝失其所藏但口以傳授勝既耄昏乃繆合二十四篇爲二十九歐陽夏侯之徒皆學之寫以漢世文字號今文尚書至武帝時孔惠之書始出屋壁百篇皆在而半已磨滅又皆科斗文字惠孫安國以𨽻古定之得五十八篇爲之作傳號古文尚書至陳隋之間伏生之學廢絶而孔傳獨行先是孔傳亡其舜典東晉梅頥一作􅄨乃以王肅所註伏生舜典足其篇至唐孝明不喜𨽻古始更以今文行於世共七部計八十一卷古文尚書十三卷尚書十三卷謹按永樂大典引此條入孔安國𨽻書古文尚書條下尚書大傳三卷漢濟南伏勝撰後漢大司農鄭𤣥注伏生本秦博士以章句授諸儒故博引異言授受援經而申證云尚書正義二十卷孔頴達等撰尚書廣䟽十八卷僞蜀馮繼先撰以頴達正義爲本小加己意尚書斷章十三卷不著撰人姓氏按其書畧序衆篇大旨謹按天一閣抄本此書下有成伯璵三字與註不著名氏之說不符恐是朱彛尊所加非原本所有尚書釋文一卷陸德明撰皇朝太子中舍陳鄂奉詔刋定始開寳中詔以德明所釋乃古文尚書與唐明皇所定今文駮異今鄂删定其文改從頴書葢今文自曉者多故音切彌省詩類昔孔子删古詩三千餘篇取其三百一十一篇著于經秦楚之際亡其六漢興詩分爲四一曰魯人申公作訓詁號魯詩二曰齊人轅固生作傳號齊詩三曰燕人韓嬰作内外傳號韓詩四曰河間人毛公作故一作詁訓傳號毛詩三家並列學官而毛以後出至平一作章帝時始列于學其後馬融賈逵鄭衆康成之徒皆發明毛氏其學遂盛魏晉之間齊魯之詩廢絶韓詩雖在而益微故毛氏獨行遂傳至今韓嬰之書至唐猶在今其存者十篇而已漢志嬰書五十篇今但存其外傳非嬰傳詩之詳者而其遺說時見于他書與毛之義獨異而人亦不信去聖既逺誦習各殊至于考風雅之變正以知王政之興衰其善惡羙刺不可不察焉共八部計一百一十五卷毛詩古訓傳二十卷韓詩外傳十卷韓嬰撰毛詩草木鳥獸蟲魚䟽二卷吳太子中庻子烏程令陸璣撰世或以璣爲機非也機自爲晉人本不治詩今應以璣爲正然書但附詩釋誼窘于采獲似非通儒所爲者將後世失傳不得其真歟毛詩正義四十卷唐國子祭酒孔頴達撰太孫長孫無忌諸儒刋定國朝端拱初國子司業孔准等奉詔是正詩學之家此最爲詳毛詩小䟽二十卷不著撰人名氏因孔䟽爲本删取要義輔益經注云毛詩指說一卷唐成伯璵撰畧序作詩大指及師承次序毛詩斷章二卷唐成伯璵撰大抵取春秋賦詩斷章之義鈔取詩語彚而出之毛詩觧題二十卷不著撰人名氏篇端搃叙詩義次述章旨葢近儒之爲者歟禮類以下原卷三禮樂之制盛于三代而大備于周三代之興皆數百年而周最乆始武王周公脩太平之業畫天下以爲九服上自天子至于庻人皆有法度方其郊祀天地䦕明堂以會諸侯其車旗服器文章爛然何其盛哉及幽厲之亂周室衰微其後諸侯漸大然齊桓賜胙而拜晉文不敢必請隧以禮維持又二百餘年禮之功亦大矣下更戰國禮樂殆絶漢興禮出淹中后戴諸儒共爲補綴得百餘篇三鄭王肅之徒皆精其學而說或不同夫禮極天地朝廷宗廟凡人之大倫可謂廣矣雖二一作百家殊說豈不博哉自漢以來沿革之制有司之傳著於書者可以覽焉共三十三部計一千九十七卷周禮十二卷儀禮十七卷禮記二十卷大戴記十三卷周禮疏五十卷賈公彥撰儀禮䟽五十卷禮記正義七十卷孔頴達等撰三禮義宗三十卷梁明威將軍崔靈恩撰其書合周禮儀禮二戴之學敷述貫串該悉其義合一百五十六篇推衍閎深有名前世云江都集禮一百四卷闕三禮圖九卷闕梁正撰三禮圖二十卷聶崇義集禮記外傳四卷成伯璵撰禮記字例同異一卷闕五禮名義十卷開元禮京兆義羅十卷不著撰人名氏據開元已有義鑑申衍其說今此又網羅其遺墜云開元禮類釋二十卷不著撰人名氏以唐禮繁重故彚其名物粗爲申釋開元禮一百五十卷闕開元禮義鑑一百卷唐蕭嵩撰既定開元禮又以禮家名物繁夥更取歴代沿革隨文釋義與禮並行開元禮旨問二卷五禮精義十卷唐太常博士韋􅊮撰首載唐禮叅引古義申釋其文續曲䑓禮三十卷禮略十卷唐京兆府櫟陽尉杜肅撰採古經義下逮當世槩舉沿革附禮見文以其言約旨詳故自題略云禮粹二十卷闕唐寕州叅軍張頻纂凡一百二十五條直鈔崔氏義宗之說無他異聞開寳通禮二百卷開寳通禮義纂一百卷闕皇朝翰林學士盧多遜等撰多遜既定新禮復因開元禮義鑑增益爲開寳通禮義纂一百卷上之詔與通禮並行䘮禮極義一卷闕唐商价集雜序先儒五服輕重之論然首末不倫五服志三卷不著撰人名氏據江都開元二禮叅引先儒所論輕重之制盖唐人所紬次云䘮服加减一卷闕不著撰人名氏雜記服制增損文無倫次春秋諡法一卷不著撰人名氏其法差多于周公諡法周公諡法一卷不著撰人名氏諡法始于周學者錄之因託以名篇諡例十卷諡法十卷梁賀琛撰初約本周公之諡法至琛又分君臣羙惡婦人之諡各以其類標其目曰舊諡者周公之諡法曰廣諡者約所撰也曰新諡者琛所增也按永樂大典引此作諡法四卷文獻通考亦同續古今諡法十四卷唐户部郎中王彦威撰因舊諡品援集故事依沈約諡例記梁已來至唐得諡官稱姓名又以單複諡爲别樂類以下原卷四三代禮樂自周之末其失已多又經秦世􅌍學之暴然書及論語孝經得藏孔氏之家易以卜筮不禁而詩本諷誦不專在于竹帛人得口以傳之故獨禮之于六經其亡最甚而樂又有聲器尤易爲壊失及漢興考求典籍而樂最缺絶學者不能自立遂并其說于禮家書爲五經流别爲六藝夫樂所以達天地之和而飭化萬物要之感格人神象見功德記曰五帝殊時不相沿樂所以王者有因時制作之盛何必區區求古遺缺至于律吕鍾石聖人之法雖更萬世可以考也自漢以來樂之沿革惟見史官之志其書不偹隋唐所録今著其存者云共四十八部計一百八十一卷歴代樂儀三十卷唐叶律郎徐景安撰總序律吕起周漢訖于唐著唐樂章差爲詳悉大樂令壁記三卷唐叶律郎劉貺撰分樂元正樂四夷樂合三篇樂府古題真觧一卷謹按文獻通考古樂府樂府古題要觧共十二卷崇文總目唐吳兢撰釋古樂曲所以名篇之意樂府觧題一卷不著撰人名氏與吳兢所撰樂府古題頗同以江南曲爲首其後所觧差異謹按永樂大典云宋志王昌齡續樂府古觧題一卷崇文總目同樂府古今觧題三卷唐郗昻撰或云王昌齡撰未詳孰是舊云古今樂府觧題又云古題所載曲名與吳兢所撰樂府觧題頗異復有唐李百藥辭今定爲樂府古今觧題聲律要訣十卷唐田琦撰推本律吕及制管定音之法文雖近俗而于禮樂尤詣焉樂府雜録一卷唐段安節撰其事蕪駁不倫羯鼔録一卷唐南卓撰羯鼔夷樂與都曇答鼓皆列於九部至唐開元中始盛行于世卓所紀多開元天寳時曲云大周正樂一百二十卷周翰林學士竇儼撰顯德中儼奉詔集綴其書博而無次樂苑五卷不著撰人名氏叙樂律聲器凡二十篇周優人曲辭二卷周吏部侍郎趙上交翰林學士李昉諫議大夫劉濤司勲郎中馮古纂録燕樂優人曲詞景祐大樂圖二十卷闕皇朝司封員外郎集賢校理聶冠􅀸撰景祐二年大樂署以律凖考定雅樂獻之上召祠部員外郎集賢校理李照問鍾律大要照請用􅁰尺求聲遂命照制新樂冠􅀸討論故事據經義多所損益以御製樂曲及鐘律議說制器之法與古今樂器圖象之異為書一百二十六篇上之大樂圖義二卷皇朝太常博士直史館宋祁撰受詔考試太常樂工因集古樂鐘律器用之說上列爲圖從釋其義并今樂署闕典所當釐補者更爲雜論七篇奏之琴操三卷晉廣陵相孔衍撰述詩曲之所從總五十九章琴譜三均手訣一卷宋謝莊撰叙唐虞至宋世善琴者姓名及古典名言琴通三均謂黃鐘中吕無射琴手勢譜一卷唐道士趙邪利撰記古琴指法爲左右手圖二十一種金風樂一卷闕唐𤣥宗撰盖琴曲名琴書三卷唐翰林待詔趙惟􅌔撰略述琴製叙古諸典及善琴人姓名琴譜十三卷闕唐陳康士撰按康士作琴曲一百章譜十三卷宫調二十章商調十章角調五章徴調七章琴調五章黃鐘十章離憂七章沉湘七章側蜀七章縵角七章玉女五章其譜散亡今書舊目有琴調六卷琴譜一卷殘缺無首尾所裁乃楚角宫黃鐘側蜀琴調數篇餘皆亡琴譜序一卷陳康士等撰康士字安道以善琴知名嘗撰琴曲百篇譜十三卷進士姜阮皮日休皆爲序以述其能康士譜今别行琴調四卷闕陳康士撰楚調五章黃鐘調二十章側蜀瑟調皆一章琴調譜一卷離騷譜一卷闕陳康士撰依離騷以次聲大唐正聲新扯琴譜一卷闕唐􅌔拙纂集琴家之說不專聲譜廣陵止息譜一卷唐吕渭撰晉中散大夫嵇康作琴調廣陵散說者以魏氏散亡自廣陵始晉雖暴興終止息於此康避魏晉之禍託之於鬼神河東司户叅軍李良輔云袁孝尼竊聼而寫其聲後絶其傳良輔傳之于洛陽僧思古傳於長安張老遂著此譜總三十三拍至渭又増爲三十六拍廣陵止息譜一卷闕謹按永樂大典云李良輔廣陵止息譜一卷崇文總目闕東杓引譜一卷闕唐叶律郎李約撰約患琴家無角聲乃造東杓引七拍有麟聲繹聲以偹五音無射商九調譜一卷闕唐蕭怗撰怗因胡笳推無射商自創爲九調琴雅略一卷闕唐殿中侍郎齊􅀈撰槩言創制音器之略琴聲律圖一卷闕唐恭陵署令王大方承詔撰國琴制度以六十律旋宫之法次其上前序歴引諸家律吕相生之術琴德譜一卷闕唐因寺僧道英撰述吳蜀異音及辯析指法道英與趙邪利同時盖從邪利所授沈氏琴書一卷闕沈氏撰不著名首載嵇中散四弄題趙師法撰次有悲風三峡流泉淥水昭君下舞間弦并胡笳四弄題盛通師撰盖諸家曲譜沈氏集之張淡正琴譜一卷茅仙逸人張淡正撰不詳何代人觧琴指法琴譜一卷梁開平中王邈撰小胡笳十九拍一卷闕僞唐蔡翼撰琴曲有大小胡笳大胡笳十八拍沈遼集世名沈家聲小胡笳又有契聲一拍共十九拍謂之祝家聲祝氏不詳何人所載乃小胡笳子琴調一卷闕僞唐蔡翼撰琴雜說一卷不著撰人名氏盖琴家雜集器圖聲訣之略琴調三卷闕不著撰人名氏無射商角諸譜皆亡其曲名琴譜四卷闕不著撰人名氏凡四大曲一曰别鶴林其三皆失其名而譜存今留以待知琴者琴略一卷闕不著撰人名氏序有七例頗抄六代善琴者各爲門類又載拍法及雜曲名琴式圖二卷闕不著撰人名氏以琴制度爲圖雜載趙邪利指訣又有白雲先生三訣三樂譜一卷不著撰人名氏載商調三樂記琴譜纂要五卷不著撰人名氏圖琴制度及載古曲譜曲名琴書正聲九卷闕不著撰人名氏集㳺春綠水幽居坐愁思秋思楚明光易水鳯歸林接興白雲凡十四譜琴譜調五卷不著撰人名氏雜錄琴譜大小數曲其前一大曲亡其名舊本或云李翺用指法與諸琴法無異而云翺者豈其所傳歟按永樂大典引宋志作琴譜調三卷文獻通考同阮咸調弄二卷闕不著撰人名氏阮咸金羽調一卷降聖引譜一卷闕不著撰人名氏降聖引一篇譜一首不詳何代之曲阮咸譜二十卷闕阮咸曲譜一卷不著撰人名氏有宫商角徴無射宫無射商金羽碧玉凄凉黃鐘調凡十篇總二十卷崇文總目卷一
