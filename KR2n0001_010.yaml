body:
  text: 崇文總目卷十宋王堯臣等撰道書七共五十一部計八十一卷以下原卷五十一四家要訣一卷闕龍虎金液還通元論一卷闕陶真人金丹訣三卷闕真元妙道經一卷闕修身立驗一卷闕服龍虎丹訣一卷闕還元丹論一卷闕金液丹訣一卷闕青霞子寶藏論一卷元珠歌逍遙歌內指黃芽歌一卷闕金碧要旨一卷闕金液神丹經三卷闕金液神氣經十卷闕金華玉女經一卷闕蓬萊山東西竈還丹經一卷金石真宰通微論一卷闕金液還丹龍虎歌一卷闕水簾洞大還丹賦一卷闕道書口訣祕法一卷闕還陽先生鉛黃芽傳一卷闕金液三魂法一卷闕太清論石硫黃經一卷闕金石還丹術一卷闕金石靈臺記一卷巨勝歌一卷學道神仙藥方一卷闕雲母論二卷闕服雲母粉療患方一卷闕蓬萊山草藥還丹訣一卷闕太清真人鍊雲母訣二卷闕靈寶神仙玉芝瑞草圖二卷闕太上靈寶芝品一卷芝草黃精經一卷闕神仙芝草圖二卷靈寶服食五芝品經一卷闕延夀靈芝瑞圖一卷闕白雲仙人靈草歌一卷闕金石藥方一卷闕太清諸石變化神仙方集要一卷闕丹房鑑源三卷藥枕方一卷神仙得道靈藥經一卷闕峨嵋山神異記三卷闕太清經藥方一卷闕仙翁煉石訣一卷闕伏藥經三卷闕石藥爾雅一卷闕養生神仙方三卷闕洞靈仙方一卷闕仙芽根方一卷黑髮酒方一卷闕煉三十六水石法一卷闕達靈經一卷闕菊潭法一卷闕小黃消丹應候訣一卷闕九靈指元篇一卷闕道書八共五十五部計八十五卷以下原卷五十二墨子枕中記二卷闕女青神律十卷闕老子六甲祕符妙録一卷闕修六丁八史用事紏法一卷闕九天元女六甲將軍手訣一卷闕六丁通應玉女真録手訣一卷闕祭六丁神法一卷闕老子六甲祕符妙録一卷闕靈飛六甲左右內名玉符一卷闕天蓬神呪一卷太上北帝天蓬壇場印圖一卷闕五嶽真形圖文一卷靈寶五嶽真形圖一卷八卦仙人祕訣一卷闕黃帝八卦真形圖一卷闕太神左仙翁説法符經一卷太上洞黃靈寶元始五方赤書自然真文經一卷闕太清起章一卷闕太上習仙經契符録一卷闕太上北帝靈文一卷闕金書玉劵一卷闕太上洞元靈寶投簡符文要訣一卷闕太上靈寶護身符録一卷太清洞真紫蘭北壁真文一卷闕太上禳解災厄吉兆玉篆一卷闕太上玉真章訣三卷闕太上靈寶吞服真文玉字一卷闕太上靈寶洞元大道無極自真一五稱符經二卷天乙太乙日月星辰二十八宿行藏記一卷闕北帝三僃經三卷闕罔象成名圖一卷闕北帝神呪經十卷三尸經一卷闕孫真人長生延夀經一卷北帝靈文三卷延夀赤書一卷天神經一卷闕太上北帝治病道法一卷闕髙上紫虛法籙二卷闕上清洞真瓊宫五帝靈飛六甲內文三卷闕北帝元樞內章一卷闕泰乾祕要三卷闕九微心戒一卷三五思神圖一卷山栖要録一卷闕守庚申服藥法一卷闕青崖子神仙金銀論一卷闕掌訣圖一卷闕太上三五禁氣步罡法一卷闕太上靈寶飛行三界妙經一卷闕太上洞真飛行羽經一卷太上靈書三魂七魄經一卷闕嘯旨一卷問天老厯一卷金柯四時色氣元機歌一卷闕道書九共六十部計一百六卷以下原卷五十三翊聖保德真君傳三卷老子內傳三卷闕老子出塞記一卷老子開天記一卷皇天原太上老君現迹記一卷闕尹喜東行記一卷闕議化胡經狀一卷樓觀內傳二卷列仙傳二卷謹按直齋書録解題曰崇文總目作二卷七十二人續神仙傳三卷神仙內傳一卷闕神仙傳略一卷闕晉洪州西山十二真君內傳一卷闕賓仙傳一卷疑仙傳一卷闕道教記一卷闕厯代帝王崇道記一卷神仙纂要録一卷闕真教元符三卷闕墉城集仙籙十卷洞仙傳九卷真系傳一卷道經降代傳授年載記一卷闕成都山望仙宫十真記一卷闕八仙圖一卷闕玉清虛真人內傳一卷闕茅山新小記一卷闕茅三君內傳一卷闕元洲上卿蘇君記一卷闕周義山內傳一卷闕南嶽魏夫人內傳一卷劉真人內傳一卷蘇耽傳一卷闕裴元人傳一卷許邁傳一卷闕劉善慶傳一卷闕許遜修行傳一卷闕馬隂二君內傳一卷葉君善傳二卷闕謫仙崔少元傳二卷東極真人傳一卷闕瞿童述一卷潘尊師傳一卷洪崖先生傳一卷吳大師內傳一卷胡慧超傳一卷闕鍊師傳一卷闕平都山仙都觀記一卷闕神光寺聖迹記一卷闕南嶽小録一卷闕元始上真記一卷闕寧州通真觀主宿真形圖贊一卷闕聖記賦一卷闕山水穴實圖一卷二十四化記三卷闕正一真二十四治圖一卷闕元化圖一卷闕福地記一卷混元圖十卷闕紫庭祕訣一卷釋書類釋書上共五十七部計三百三十六卷以下原卷五十四注般若波羅密多心經一卷般若波羅密多心經疏一卷楞嚴經十卷首楞嚴經疏六卷闕譯義金剛波若波羅密經贊誦一卷闕圓覺經疏六卷金剛經口訣義一卷金剛經報應記三卷闕金剛經訣一卷闕六祖大師金剛大義訣二卷闕佛説垂涅槃略説教戒經一卷闕起言論二卷壇經一卷佛説一乘究竟佛心成經一卷闕佛説三停厨法經一卷闕佛説未曽有因緣經二卷闕佛説法句經一卷闕釋摩訶衍論五卷闕起信論二卷起信論鈔三卷闕僧肇論二卷勸修破迷論一卷闕辨正論八卷大乘百法明門論疏二卷闕金砂論一卷福田論一卷闕寶藏論一卷景德傳燈録三十卷法苑珠林一百卷釋迦氏譜略一卷釋氏六帖十四卷真門聖胄集五卷藏經音義隨函三十卷闕大藏經音四卷闕內典序記集十卷闕通惑決疑録一卷闕請禱集十卷闕內典編要十卷闕僧史略三卷釋氏蒙求五卷法門名義集一卷廣法門名義三卷渾混子三卷闕寒山子詩七卷髙僧纂要五卷闕法喜集二卷闕看經讃一卷闕釋華嚴遊澓偈一卷闕惟徑禪師讃誦一卷闕感通賦一卷闕相傳雜語一卷闕裴修拾遺問一卷闕參元語録十卷七科義狀一卷闕玄聖蘧廬一卷釋書中共五十四部計八十九卷以下原卷五十五天台止觀一卷華嚴法界門一卷中觀論三十六門勢疏一卷闕禪源諸銓集二卷統略靜住子淨行法門一卷闕漳州羅漢和尚法要三卷闕明道宗論一卷闕祖堂集一卷闕入漸通真議一卷闕雲居和尚元化實録一卷闕元中語録三卷闕大唐國師小録要集一卷闕顯宗集一卷闕圓覺道場修證儀十八卷闕大雲和尚法要一卷闕無止祕密小録五卷闕一宿覺傳一卷闕達摩血脈一卷竹林集一卷見道訟一卷闕行道難歌一卷闕永嘉一宿覺禪宗集一卷法眼禪師集一卷闕禪宗理性偈一卷闕遺聖集一卷闕偈宗祕論十卷闕菩提心記一卷闕楞迦山主小參録一卷闕石頭和尚參同契一卷忠國師語一卷闕東平大師默論一卷闕天台國師百會語要一卷闕龎居士歌一卷紫陵語一卷闕僧齊寶禪要三卷闕百文廣語一卷闕無住和尚説法記二卷闕棲賢法俊一卷闕龍濟和尚語要一卷荷澤禪師微訣一卷闕大乘入道坐禪次第要論一卷闕慧海大師入道要門論一卷闕淨本和尚語論一卷闕積元集一卷闕禪關入門一卷闕雍熙禪頌三卷闕法眼真讃一卷闕仰仙辨宗論一卷闕禪門法師傳五卷闕六祖傳一卷闕傅大志王傳語一卷闕相傳雜語要一卷闕德山集一卷闕謹按東觀餘論云崇文總目德山集德山不詳何人德山在朗州蓋宣鑒禪師乃唐僖宗朝人此云不知何人疏繆如此淨慧偈頌一卷闕釋書下共二十七部計二百二卷以下原卷五十六廬山集十卷比邱尼傳四卷洪明集十卷廣洪明集三十卷開皇三寶録十四卷闕寶林傳十四卷清道場百録一卷闕法顯傳一卷西域求法髙傳一卷闕真覺大師傳一卷闕髙僧懶殘傳一卷闕僧法别傳三卷往生淨土傳五卷六祖法寶記一卷闕金陵塔寺記三十六卷舍利塔記一卷闕瑞象厯年記一卷闕華嚴經纂靈記五卷闕前代國王修行記五十卷闕迦葉祖裔記一卷闕攝山栖霞寺記一卷闕竺道生法師十四科元贊義一卷闕潤文官録一卷闕釋門要録五卷闕僧伽行狀一卷闕妙香丸子法一卷闕崇文總目卷十
